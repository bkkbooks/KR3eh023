body:
  text: 卷下一頭痛頭者天之象也陽之分也六腑清陽之氣五臟精華之血皆朝會於高巔天氣所發六淫之邪人氣所變五賊之逆皆能犯上而為酷害或矇蔽其清明或壅遏其經隧與正氣相薄鬱而成熱脈滿而痛是皆為實也若寒濕所侵雖正氣衰微不與相搏而成熱然邪襲於外則血凝澀而脈攣縮收引小絡而痛得溫則痛減是為虛也因風而痛抽掣惡風或自汗出川芎細辛羌活防風升麻柴胡荊芥穗乾葛薄荷甘菊藁本天麻蔓荊子白芷因暑而痛或有汗無汗惡熱香薷扁豆藿香黃連厚朴甘菊因痰飲而痛昏重憒憒欲吐眼黑頭旋天麻半夏白朮陳皮甘草芩連因濕熱頭痛頭必重遇天陰尤甚令人煩心川芎細辛蒼朮芩連羌防甘草冬月厥逆而痛大寒犯腦深入骨髓故頭痛齒亦痛麻黃羌防升芷蒼柏黃耆附子殭蠶氣虛痛耳鳴九竅不利遇勞則甚參耆歸朮升麻芎芍細辛蔓荊子陳皮甘草血虛痛自魚尾眉尖後近髮際上川芎生地黃薄荷當歸用沸湯泡乘熱吸之候溫服氣血俱虛參耆苓朮芎歸升柴蔓荊細辛凡治頭痛皆取風藥者乃東垣所云高巔之上惟風可到味之薄者陰中之陽自地生天者也然有三陰三陽之別太陽惡風寒脈浮緊頭頂痛用麻黃川芎獨活藁本杏仁甘草少陽頭角痛脈弦寒熱柴胡黃芩半夏甘草陽明頭額痛自汗發熱不惡寒脈浮長緩實升葛芷甘石膏太陰頭痛體重有痰脈沉緩蒼朮半夏南星茯苓陳皮甘草少陰頭痛足冷脈沉氣逆為厥麻黃附子細辛湯厥陰頭項痛吐涎沫冷厥脈浮緩人參吳茱萸大棗生薑陰經頭痛可用溫藥附桂薑萸風濕生熱頭痛上壅損目及偏正頭風年深不愈並宜空青膏芩連羌防芎柴甘荊如陽明發熱惡寒而渴白虎湯加白芷頭旋眼黑者必用安神散羌防升柴知柏芩連生地甘草或川芎散芎羌柴細荊薄菊草茵陳香附槐子石膏熱厥頭痛時當嚴冬猶喜風寒略見溫暖其痛便甚清上瀉火湯荊防羌本細蔓參歸耆朮紅生甘苓知柏芩連升等共十九味次服補氣湯參耆辛歸甘丁麻升煎服風熱頭痛石膏散麻黃石膏乾葛首烏頭痛及胸痛食少寒冷咽嗌不利左寸弦急宜麻黃吳萸湯麻吳蒼羌升藁柴芩連柏芎細半蔓紅甘陳新沐中風為首風頭面多汗惡風當先一日則病甚至其風日則少愈大川芎湯川芎天麻二味為末蜜丸茶送下風氣循風府而上則為腦風項背惡寒腦戶極冷神金散麻黃細辛乾葛藿香等分為末酒下因發散太過宜酸收而斂之乳香落盞散甘桔陳柴乳香粟殼末服腎厥頭痛玉真丸硫磺二兩石膏半夏硝石各一兩為末薑汁丸薑湯送再灸關元百壯寒甚者去石膏用鍾乳或黑錫丹痰厥頭痛眼黑頭旋噁心煩悶半術天麻湯徇蒙招尤目眩耳聾肝風虛動也鉤藤散鉤藤陳皮半夏麥冬人參茯苓甘草甘菊石膏防風傷食頭痛胸滿惡食吞酸喛腐香砂枳朮楂曲麥卜或紅丸子三稜莪朮青陳薑椒醋糊丸礬紅為衣傷酒頭痛葛母解酲湯葛根知母參苓砂蔻青陳香曲豬苓生薑煎服怒氣傷肝頭痛宜以沉香降氣散沉香青陳柴蘇細芍臭毒頭痛香附炒煎服偏頭風總屬於痰又左屬風荊芥薄荷右屬血虛芎歸地芍雷頭風之痛而成核塊者是也或如雷鳴清震湯荷葉升麻蒼朮腫核宜刺出血亦有屬痰熱者痰熱生風也半夏一兩皂角薑汁煮大黃二兩酒浸紙包煨三次殭蠶連翹橘紅桔梗天麻各五錢黃芩七錢薄荷三錢白芷粉草礞石硝煅各一錢共為末蒸餅丸臨臥茶吞二錢真頭痛天門真痛上引泥丸夕發旦死旦發夕死腦為髓海真氣所聚本不受邪一受不治古方用參附湯可救十之一然天柱折及手足青至節者則難為力矣又法參附湯送黑錫丹灸百會穴或有得生者黑錫丹沉香附子胡蘆巴茴香肉桂各五錢補骨脂肉豆蔻木香各一兩硫黑鉛各二兩熔砂子二兩酒煮麵糊丸梧子大陰乾布袋擦令光瑩每服四十丸空心薑鹽湯下傷寒頭腫如斗多屬天行疫病東垣云身半以上天氣主之身半已下地氣主之此雖邪熱客於心肺若以承氣下之是誅伐無過矣宜消毒普濟飲芩連瀉心肺之火橘紅苦參生甘草瀉火而兼補氣牛蒡連翹薄荷葛根殭蠶馬屁勃解毒升麻引經桔梗為舟楫白湯調末時時服少許海藏論大頭痛者感四時不正之氣大抵足陽明邪熱實資少陽相火而益熾視其腫在何部隨其經而治之濕熱為腫風木為痛以先見者為主治之宜早不宜遲恐過其病所也頭分受邪見於至高之分當先緩而後急先緩者不用重劑也更須緩服若急服則不能去病凡藥性味形體皆宜緩施及寒藥須酒浸炒之其意皆是也後急者謂已經高分之邪得瀉入於中焦染於有形質之地若不速去反損陰也此謂客邪當急去之是治客以急也甘桔湯加石膏白芷牛蒡連翹大黃延胡殭蠶荊芥眉稜骨痛眉骨者目系所過上抵於腦諸陽經挾外邪郁成風熱毒上攻腦下注目睛遂從目系過眉骨相併而痛若心肝壅熱上攻目睛而痛亦目系與眉骨牽引而痛風痰上攻者亦然若脾家濕氣內郁寒迫下焦痛流於項互引眉骨有痰者有抽掣者有重者有悶者各審明而治之選奇湯最妙羌活防風各三錢酒芩一錢甘草三錢水煎分三服如因風熱者祛風清上散酒芩二錢白芷一錢五分茱萸防風柴胡各一錢川烏一錢二分荊芥八分甘草五分水煎服因痰者二陳湯加芩芷因風寒者羌烏散羌細各一錢川烏草烏俱用童便浸一宿各一錢酒芩炙草各五分共為末服戴復庵分為二症皆屬於肝一作肝氣傷發則頭引眉骨俱痛眼不能開晝靜夜劇導痰湯加川烏細辛又作肝虛痛若一見光明即發生熟地黃丸主之偏正頭痛搐鼻瓜蒂散藜蘆川芎蒼耳薄荷焰硝雄黃各一錢天竺黃一錢五分上為末含水口中搐鼻一七立效治卒頭痛方皂莢末搐鼻取嚏又鵝兒不食草陰乾為末取嚏亦妙祕方貼兩太陽穴治火熱痛大黃為末加焰硝等分以井泥和捏作餅貼之頭風塞鼻方蓽茇細辛為末以豬膽汁拌紙條蘸於鼻內塞之又方胡椒為末吹之又法萆麻肉五錢大棗十五枚共打和塗紙上用竹筋卷上去筋將此入鼻孔良久取下清涕即止又法生萊蔔汁仰臥注鼻中左注右右注左針灸經云頭痛頭風頭運皆有風有火有痰亦多屬虛如本事方曰腎虛則頭痛下虛也肝虛則頭運上虛也均宜補之若灸百會囟會而丹田氣海必不可缺而痛腦頂陷至泥丸者此真頭痛旦發夕死夕發旦死頭痛筋攣驚不嗜臥謂之腎厥頭痛宜灸關元百壯服用玉真丸偏正頭痛刺絲竹空二穴風池二穴合谷二穴內捻針吸氣三口又內捻針吸氣五口患人自覺針下有痛一道如線上至頭為度長呼氣一口出針立愈東垣云高巔之上惟風可到故味之薄者陰中之陽自地升天者也所以頭痛皆用風藥治之總其大體而言也然患痛者血必不足而風藥最能燥血故有愈治而愈甚者此其要尤在養血不可不審也一人往返燕京感受風寒遂得頭疼數月不休凡頭風之藥無所不服其痛更甚肢肉瘦削扶策踵門求豫療治豫思此症明系外邪如何解散不效語有之曰治風先治血血行風自滅本因血虛而風寒入之今又疏泄不已烏能愈乎又聞之痛則不通通則不痛故以當歸生血活血木通利脈道而行當歸之力問患者能酒乎曰能而且可多近為醫戒不敢飲因令用斗酒入二味於中浸三日夜重湯煮滾乘熱飲之至醉醉則去枕而臥臥覺疼若失所以取酒者欲引二藥之性上升於頭至醉乃臥者醉則挾肌膚淪骨脈藥力方到臥則血有所歸其神安也有志活人者推此用之思過半矣然又有火鬱於上而痛者經云火淫所勝民病頭痛治以冷劑宜酒芩石膏之類治之不可泥於此法也又有一方用芎歸熟地連翹各二錢水煎去渣以龍腦薄荷葉二錢放碗底將藥乘沸衝下鼻吸其氣俟溫即服服即安臥其效甚速然亦為血虛者所設耳腦者髓之海髓不足則腦為之痛宜茸珠丹之類治之如用風藥久之必死目痛另有專科方藥今附針灸法於後眼暴赤紅腫痛合谷攢竹睛明臨泣迎風流淚上星風池肝俞大小骨空攢竹臨泣時谷針灸二間灸目生翳障上星時谷風池睛明瞳子窖目昏肝俞灸七壯一法灸足三里引火下降目自明也雀目神庭上星百會前頂囟會五穴宜出血以鹽塗之小兒肝積眼灸時谷五壯第一大效穴偷針眼視其背上有紅點如瘡以鋒針刺破即瘥二眩暈眩在眼黑而花暈如轉運之運俗名頭眩頭旋內經論暈屬肝木為上虛仲景主痰丹溪主火與虛風則脈浮有汗川芎散川芎白芷防風甘菊人參茯神山茱萸山藥陳皮寒則脈緊無汗抽掣而痛不換金正氣散蒼朮厚朴甘草陳皮乾薑丁香棗薑肝木上虛而眩四物湯加天麻甘菊枸杞腎虛上則頭眩六味丸加牛膝沉香肉桂納火歸元之法也伏痰嘔逆旋覆花湯參苓朮草橘半乾薑旋覆因火者茶調散或酒炒大黃末茶調服七情所傷半夏茯苓陳皮棗仁遠志肉藿香木香肉桂青皮有虛在氣分或汗多亡陽而眩者宜補中益氣加芎地天麻或腦虛而眩用鹿茸為末同六味湯服針法用上星風池合谷神庭肝俞腎俞足三里解溪等穴斟酌選用防眩湯人參三錢白朮熟地當歸各一兩川芎山萸五錢白芍一兩半夏三錢天麻一錢陳皮五分水煎服蓋眩暈似乎小症卒然眼花倒僕而不可救者治之不可不早故曰防眩多服受益不可一二劑不見功而止也三心痛心為君主之官丙丁之元神靈之舍邪氣不得而犯之其受傷者乃包絡也包絡引邪真犯心臟謂之真心痛必死不治怵惕思慮則傷神神傷則虛而邪干之故胞絡受邪而痛也心主諸陽又主陰血故因邪而陽氣鬱抑者痛陽虛而邪勝者亦痛因邪而陰虛凝注者亦痛陰虛而邪勝者亦痛方論分為九種曰飲風冷熱血食悸蟲疰俱未述內經之旨如內經論六淫為邪乘心而痛各有病形故靈樞曰與背相控善瘛如從後觸其心傴僂者腎心痛也茴香胡蘆巴肉桂地黃附子川楝沉香茯苓腹脹胸滿心尤痛甚胃心痛也香附茯苓枳朴蒼陳痛如錐針脾心痛也白朮菖蒲乾薑歸芍枳朴香砂甘陳色蒼蒼如死狀終日不得太息肝心痛也青沉木香芍桂連甘吳萸能俯不能仰動作痛益甚肺心痛也白蔻紫菀天冬桔梗枳殼乾薑痛引小腹上下無定溲便難則病心疝取足厥陰藥用茴香川楝青木香木香肉桂歸地心痛腹脹大便閉枳朴香菖大黃心痛引腰吞欲嘔取足少陰心痛引背不得息刺足少陰不已取手少陽心痛腹脹嗇嗇然大便不利取足太陰心痛引背不得息刺手太陰如五運六氣上下勝復相乘於心而痛亦必有諸痛狀苟未能悉何以施治哉五臟失調皆為心痛刺治分經理甚明悉至如舍針用藥尤宜詳察其義腎心痛者多由陰邪上衝故善瘛如從後觸其心胃心痛者多由停滯中焦故胸腹脹滿脾心痛者多由寒犯中焦故其痛尤甚肝心痛者多由木火之郁病在血分故色蒼蒼如死狀肺心痛者多由上焦不清病在氣分故動作則痛益甚知其在氣則順之在血則行之鬱則開之滯則逐之火多實則或散或清寒多虛則或溫或補若犯真心痛乃不可治其餘能得其情應手而愈易如探囊也胃脘痛今呼心痛也其在蔽骨之下所謂胃脘當心而痛胃為濕土位列中焦多氣多血是水穀之海五臟六腑皆於此受氣而天人所感之邪壯者氣行自愈怯者著而成病沖和之氣變為偏寒偏熱因而水穀不消停留與中氣相薄為痛惟肝木之相乘者為甚木性暴疾兼之正克也其痛必上支兩脅飲食不下咽膈不通則為食痹謂食入即痛吐出乃止也腎氣之厥心痛厥氣上逆則寒邪犯胃而痛也或滿或脹或不能食或嘔吐或吞酸或大便難或泄瀉及面色浮黃四肢倦怠皆本病在胃也其天人相襲之邪大抵與厥心痛者相仿但與胃病兼見也難經曰陰維為病苦心痛陰維行諸陰而主營營為血血屬心故苦心痛也潔古云其治在足少陽三陰交仲景太陰症則理中湯少陰症則四逆湯厥陰症則當歸四逆湯吳茱萸湯又云按之心下滿痛者為實大柴胡湯下之脈堅實不大便腹滿不可按承氣湯下之丹溪云外受寒者當溫散內受寒者當溫利病久屬郁鬱則熱用山梔為溫藥之嚮導則邪氣易伏寒客於胃則卒然而痛外吸涼風內食涼物二陳湯加草果豆蔻吳萸乾薑之類卒心痛脈洪數黃連一味煎頓服大熱作痛清中湯黃連山梔半夏陳皮茯苓甘草草豆蔻生薑有按之痛減者是屬虛宜酸斂而養之不宜辛散死血作痛脈澀壯盛者抵當丸虛弱人四物湯加桃仁桂心蓬朮山甲降香又有痰積作痛南星安中湯痰重者加白螺螄殼或海蛤殼煅存性一錢調服心膈大痛發厥嘔逆藥不納者趁勢以鵝毛探吐痰盡而痛止食積作痛山楂草果曲芽青陳酒積作痛白蔻砂仁乾薑痰火痛白礬硃砂等分為末醋和丸薑湯下寒氣痛菖蒲良薑草蔻砂仁厚朴等分煎服腎氣逆上衝心而痛韭汁和五苓散為末作丸茴香湯下蟲痛則面有白斑唇紅能食或口吐沫先以肉汁及糖引蟲向上然後用妙功丸空心服方見癇門因蝟作痛痛有作止令人吐蛔或渴與飲轉入轉吐蛔動故也川椒烏梅檳榔黃連煎服氣刺痛沉香降氣散沉香砂仁甘草薑汁和丸湯下二錢或四磨湯木香烏藥沉香鬱金等分各水磨和酒服脈法浮大結宜降氣沉澀宜和血沉細遲易治堅大實長滑數者難治針灸法心脾疼痛灸上中脘脾俞胃俞腎俞足三里刺內關三里三陰交內庭公孫心痛欲絶一時無藥急灸大拇足指甲男左女右三壯立效四腹痛經脈者天真流行之道路也水穀之精散為營衛行於脈之內外調和五臟灑陳六腑法四時升降浮沉之氣以成生長化收藏皆天真之妙用也故曰氣血者人之神不可不謹養養之則邪不能傷失之則營衛解散諸邪乘虛客入矣於是氣停積聚為積為痰血瘀血畜當邪正相搏故作痛也脾胃內舍心腹心肺內舍胸膺兩脅胠內舍肝膽小腹腰內舍小腸與腎大小腸衝任皆在小腹此臟腑所舍之部位也靈樞曰風雨傷於上清濕傷於下傷於上者病從外入內從上而下也次傳經傳輸六經不通四肢則肢節痛腰背強或著孫脈或著絡脈或著經脈或著輸脈或著伏沖之脈或著於腸胃之募原皆能成積而痛傳於下者病起於足故積之始生得寒乃生厥乃成積厥氣生於足之下脛寒之則血脈凝注寒氣上入腸胃而腹脹腸外汁沫之道聚不得散日以成積又曰傷於臟者病起於陰多飲則腸滿起居不節用力過度則絡脈傷陽絡傷則血外溢而衄血陰絡傷則血內溢而尿血腸胃之絡傷則血溢於腸外有寒汁沫與血相搏則積成矣卒然外中於寒內傷憂怒則氣逆上下凝結不通而積成矣未至於結塊乃汁沫聚也至於七情氣逆營衛不行則液聚血凝及飲食用力過度亦然不必陰與冷始作痛也又素問有云胃實血虛其脈軟散當治食痹素問云歲土太過濕淫所勝而痛有言衝脈之病氣溢於大腸繞臍而痛有脾傷傳腎少腹冤然而痛有肝熱腹痛有腎虛腹痛有太陰厥心痛引背則諸邪竟入作痛何必與寒氣相關明矣難經曰臍上痛心症也臍下痛腎症也臍右痛肺症也臍左痛肝症也若厥心痛與五邪相乘而痛更有五臟之疝不幹睪丸止在腹作痛者種種察之庶為醫之能事則病無遁情矣臍下忽大痛人中黑者多死素問舉痛論敘腹痛十四條屬熱者僅一條須審正氣之虛實別邪之盛衰最為切要中脘痛太陰脾也實者香砂枳朮連朴蒼蓬附蔻虛者參朮歸芍耆茯甘陳益智乾薑飴糖臍腹脊痛者少陰腎也薑桂茴附少腹痛者厥陰肝也歸芍歸辛甘通薑棗痛甚者正陽散附薑皂角甘麝或仲景芍藥甘草湯甲己化土真神方也如綿綿而痛喜熱喜按香砂理中湯寒痛得溫藥不效用神保丸木香胡椒各二錢五分巴豆十粒去皮心研去油蠍七個蒸餅丸椒目大硃砂三錢為衣每服七丸空腹津唾下時痛時止脈洪數用芩連梔芍香殼朴陳甘蒼如冒暑宜香茹飲加參苓朮草如感濕而痛小便癃大便溏脈細胃苓散如蟲痛烏梅丸感應丸治之小腹痛因蓄血桃仁承氣湯加山甲桂因寒者木香茴桂吳萸青死血痛脈沉澀降桂桃歸山甲大黃胡索因疝痛者茴桂川楝青皮木香青木香若甲錯腹皮急或繞臍痛及生瘡乃小腸癰也脈數為膿用大黃葵根下之更以太乙膏丸服脈細小遲者生堅大疾數浮長者死大痛而喘人中黑者死針法凡刺腹痛須針足三里下氣為良脾虛腹滿腸鳴切痛內關中脘三里三陰交繞臍痛大腸病也天樞三里胃脘痛內關脾俞胃俞臍下冷疼灸氣海脾虛䐜脹公孫三里內庭霍亂吐瀉欲死及小腹滿痛委中刺出血五腰痛經曰腰者腎之府轉搖不能腎將憊矣又云巨陽虛則腰背頭項痛此二條言正氣之虛也又云膀胱之脈挾脊抵腰故挾脊痛腰似折此一條言邪之實也膏梁之人久服熱劑醉飽入房損其正氣則腎熱腰脊病久則髓減骨枯發為骨痿夫足之三陽從頭走足足之三陰從足走腹經筋所過皆能為痛治之者須審系何經方得應手取效若專腎虛或有寒濕風為病者毋乃固乎然虛為本而風寒濕熱為標亦有瘀血滯氣痰飲為病者風痛者浮脈或左或右痛無定處牽引兩足宜防風蒼朮白芷桔梗陳皮桃仁芎歸朴殼甚者加全蠍濕痛者久坐水濕或著雨露脈必帶緩天陰尤甚體亦沉重宜用腎著湯茯苓白朮乾薑甘草或滲濕湯二朮二苓丁香乾薑甘草如挾風加獨活寄生如挾寒加栓枝並用摩腰膏附子烏頭尖南星各三錢五分丁香樟腦硃砂雄黃各三錢五分乾薑一錢麝香五分蜜丸如圓眼大薑汁化如厚粥塗掌上烘熱摩腰中即以熱綿裹之挾濕熱者羌活勝濕湯感寒者腰間如水溶溶脈必浮緊得熱則減見寒則增宜用麻黃白芷桂附芎桂朴蒼陳薑並用摩腰膏傷熱痛者脈必洪數口渴便祕甘豆湯甘草二錢馬料黑豆二合加天麻續斷因閃僕傷痛乳香散虎脛骨敗龜版各二兩血竭赤芍乳沒歸防白附蒼耳自然銅骨碎補肉桂乾薑各三兩牛膝天麻檳榔五加皮羌活各二兩為末酒下一錢甚者加桃仁全蠍或用黑豆神散黑豆半升炒取皮芎歸芍地薑桂甘草蒲黃為末童便和酒下二錢如不效瘀血甚也宜五積散加桃仁紅花大黃蔥白煎服痰注痛者用二陳湯加南星烏藥香附枳殼氣滯痛者脈沉宜沉香砂仁香附烏藥枳殼桂怒氣傷肝及腎痛者芎歸牛膝杜仲木瓜細辛半夏菖蒲甘草棗仁煎服思憂傷脾及腎痛者歸脾湯加香附烏藥沉香砂仁抑鬱失志七氣湯人參半夏肉桂胡索乳香甘草薑棗煎服腰痛連引足膝者杜仲續斷牛膝骨碎補補骨脂胡索靈仙桃仁等分為末酒糊加核桃仁打勻丸酒下五錢凡諸腰痛俱系腎虛而挾邪者須去其邪無邪則從補可也肉桂為引導之藥鹿茸羊腎亦可腎藏志盛怒傷志而致腎敗者則腰脊強不能轉搖而死針法腰痛脊強宜人中委中腰疼及頭項強回顧不便委中承漿腰俞腎俞腰痛不可俯仰如坐水中穴取如上腰背內引痛不得屈伸近上合谷近下崑崙挫閃腰並脅痛尺澤曲池陽陵泉委中人中崑崙腰背俱疼合谷崑崙風池腰及足疼委中出血腎虛腰痛久不已肩井腎俞素問刺腰痛論曰腰痛不可舉者申脈僕參主之此太陽之穴陽蹻之本也又曰會陰之脈令人腰痛痛上漯漯然汗出汗乾令人欲飲飲已欲走刺直陽之脈上三痏在蹻上郤下五寸橫居視其盛者出血何謂直陽足太陽之脈循腰下會於後陰故曰會陰直陽之脈即陽蹻所生之申脈穴也蹻上郤下承筋穴也即腨中央如外陷者中也太陽脈氣所發禁刺但視其兩腨中央血絡乃刺之出血又曰昌陽之脈令人腰痛痛引膺且䀮䀮然甚則反折舌卷不能言刺內筋為二痏在內踝上大筋前太陰後上踝二寸所此內筋即蹻之郤交信穴也痏音委六癲狂顛屬腑痰在包絡故時發時止狂屬臟痰入於心故發而不止癲證顛之為症多因抑鬱不遂侘傺無聊精神恍惚語言錯亂或歌或笑或悲或泣如醉如癡語言有頭無尾穢汙不知經年不愈俗呼心風有狂之意不至狂之甚也暴病曰狂久病曰顛故越人云重陽者狂重陰者顛也侘傺音嗏掣失意之狀內經云顛疾始生先不樂頭重痛目赤身熱上實下虛已而煩心骨顛疾者顑齒諸俞分肉皆滿而骨居汗出煩悗嘔多沃沫氣下泄死不治筋顛疾者身踡攣急嘔多沃沫氣下泄不治脈顛疾者暴僕四肢之脈皆脹而縱嘔多沃沫氣下泄不治顛發如狂死不治下泄不治顛發如狂不治者由心之陽不勝其陰氣之逆神明散亂陽氣暴絶故發如狂猶燈將滅而復明也下泄不治者因其邪入於陰陰氣滿閉塞於下則逆而上今氣下泄腎氣虛脫故也難經云脈有陰陽更有相乘相伏也脈居陰部反見陽脈為陽乘陰雖沉澀而短為陽中伏陰脈居陽部反見陰脈為陰乘陽雖浮滑而長為陰中伏陽也王叔和脈經云陰附陽則狂陽附陰則顛陽附陰者腰以下至足熱腰以上寒也而陰附陽者腰以上至頭熱腰以下寒也蓋陰氣虛不能治於內則附陽而上升陽無承而不下降故上熱而下寒陽氣虛不能衛於外則附陰而下陷放下熱而上寒脈法堅實者生沉細者死治法先宜以吐劑湧吐其痰涎用控涎丹甘遂大戟白芥子等分糊丸淡薑湯下七丸壯者倍之下其痰涎然後用安神之劑人參茯神琥珀菖蒲遠志棗仁乳香硃砂等因驚而得者宜抱龍丸水銀二兩乳香一兩黑鉛一兩五錢將鉛入銚內下水銀結成珠子次下硃砂乳香乘熱研勻如芡實大每用一丸空心井花水下因思慮而得者歸脾湯主之兼用天地膏酒服之有因心經畜熱煩躁眼鼻如放火宜芩連花粉竹葉丹參麥冬茯神遠志菖蒲牛黃之類或因七情所致郁痰為熱者宜鬱金七兩明礬三兩細末薄荷湯泛為丸每服二錢菖蒲薑湯下或因氣滯痰迷用四七湯半夏一錢五分茯苓一錢蘇葉六分厚朴九分薑棗煎服如初起宜吐其痰苦瓜蒂為末一錢井水調一盞服得大吐後熟睡切勿呼醒吐時或令人目翻須以手掩之吐不止用麝香少許溫湯調下即止吐後須人參茯神棗仁遠志琥珀南星半夏木香煎服附孫兆治一僧患顛半年不愈但盡以咸物食之待其發渴可來取藥今夜得睡明日便愈如法治之僧睡兩晝夜而愈倘一驚覺不可復治用酒調靈苑辰砂散辰砂一兩棗仁乳香各五錢加人參為末調酒恣飲取醉令臥淨室病淺半日或一日病深者三兩日醒惜人不能用此人但知安神而不知昏其神則神始安得睡者酒力也醉則神昏而反安矣一婦人發顛用心藥不效投養正丹二服乳香湯送下更以三生飲佐之生川烏生南星生附子加木香治愈一人發顛脈喘且搏以承氣湯數下之而安針法神門內關人中足三里陰蹻陽蹻鳩尾心俞膽俞勞宮間使選用灸法小兒驚癇如狂金門僕參灸三壯炷如麥大用針入一分又灸崑崙三壯炷同用針入三分狂症狂之為症皆因陽邪過極故猖狂剛暴若有邪附殺人不避水火罵詈不避親疏登高而歌棄衣而走逾牆上屋非力所能或言未嘗見之事少臥而不飢自高貴也自辨智也自負倨也故越人云重陽者狂也素問帝曰有怒狂者此病安生岐伯曰生於陽也陽氣者因暴折而難決故善怒名曰陽厥陽明者常動巨陽少陽不動而動太疾此其候也奪其食即已夫食入於陰長氣於陽故奪其食即已使之服生鐵落為飲以其下氣疾也陽氣抑鬱而不能疏越少陽膽木挾三焦相火與太陽陰火而上逆使人發怒如狂奪其食者不使火助邪也飲以生鐵落者全以制木也木平則火降故曰下氣疾也帝曰陽明病甚則棄衣而走登高而歌或至不食數日逾牆上屋皆非其素所能也病反能者何也岐伯曰四肢者諸陽之本也陽盛則四肢實實則能登高也熱盛於身故棄衣欲走也上焦實者從高抑下生鐵落飲生鐵四十斤入火燒赤砧上捶之有花墜地是名鐵落用水二斗煮取一斗入後藥石膏三兩龍齒茯苓防風各一兩五錢元參秦艽各一面入鐵汁中煮取五升加竹瀝二合飲之自愈在上者越之瓜蒂散見前陽明實則脈伏大承氣下之虛者補之寧志膏人參棗仁辰砂乳香白蜜丸薄荷湯下或一醉散硃砂五錢曼陀羅花二錢五分末服二錢酒送下若醉便臥勿驚之經云悲哀動中則傷魂魂傷則狂妄不精不精則不正當以喜勝之以溫藥補魂之陽驚氣丸主之附子木香殭蠶花蛇天麻麻黃橘紅乾葛各五錢蘇葉一兩南星五錢硃砂為衣入冰麝少許蜜丸圓眼大一丸金箔薄荷湯下又防己地黃湯防己一錢桂枝防風各三錢甘草二錢酒浸一宿絞取汁生地二斤酒浸亦取汁和勻服以補魂之三陽喜樂無極則傷魄魄傷則狂當以恐勝之以涼藥補魄之陰辰砂丸主之辰砂白礬鬱金為末蜜丸或以苦參一味為末蜜丸薄荷湯下十丸補魄之三陰婦人熱入血室發狂不認人者牛黃丸牛黃二錢五分硃砂丹參丹皮鬱金各三錢冰片甘草各一錢為末蜜丸新汲水化服又方一味大黃為末童便調服凡症類癲狂脈候乍大乍小乍有乍無忽如常脈忽如鵲啄屋漏魚戲皆祟脈也秦承祖先以蘇合香丸湯調灌之稍蘇用木香烏藥白蔻檀香砂仁藿香蒼朮厚朴陳皮甘草生薑煎服又取東向桃柳枝各七寸煎湯灌之可蘇虛人蘇後以歸脾湯調理之凡中鬼祟卒然仆地切勿移動其尸宜令人圍繞打鼓焚燒諸品名香香氣不斷候蘇方可移動癲狂哭笑悲歌妄言登高棄衣多稱鬼神邪言灸百會三壯針人中三分心俞間使神門灸尸厥祕法用繩圍患人男左女右臂腕截斷將繩從大椎上度下脊上繩頭盡處七七壯立蘇扁鵲取三陽五會更尉兩脅下虢太子即蘇尸厥暴死不省人事百會人中啞門合谷七癇症癇病發時昏不知人卒然倒僕甚而瘛瘲抽掣目上視或口眼喎斜或作六畜聲將醒時口吐涎沫有連日發者有日三五次發者中風中寒中暑中熱則僕時無聲醒時無涎不復發也痙病亦屢發熱身體強直角弓反張不知癇之身軟或為六言之鳴也痙舊作痓傳寫之誤也此症面赤目赤頭搖口噤背反弓張或頸項強急者世多認作驚癇治之夭枉者比比耳痙亦有二症熱為寒抑無汗之痙也濕蒸為熱有汗之痙也明者別之癇症之發厥由腎中龍火之上升而肝家雷火相從而助也惟有肝風故作搐搦搐搦則通身之脂液逼迫而上隨逆氣而吐出於口也陰氣虛不能寧謐於內則附陽而上升故上熱而下寒陽氣虛不能周衛於外則附陰而下陷故下熱而上寒脈經曰寸口脈前部左右彈者陽蹻也動苦腰背痛又為癲癇僵仆羊鳴惡風偏枯麻痹身體強又曰微澀為風癇並取陽蹻在外踝上三寸值絶骨是穴即輔陽穴也又曰寸口脈後部左右彈者陽蹻也動苦癲癇寒熱皮膚淫痹又為少腹痛裡急腰及髖窖下相連陰中痛男子陰疝女子漏下不止髖髀骨也窖腰下穴也張潔古曰二脈起於足使人蹺捷也陽蹻之絡為病陽急則狂走目不寐表病里和陽病則寒可針風池風府風府在項後入髮際一寸大筋內宛宛中陰蹻為病陰急則陰厥脛直五絡不通表和里病陰病則熱可灸照海穴及陽陵泉在膝下一寸䯒外廉陷中又曰癲癇晝發灸陽蹻夜發灸陰蹻王叔和脈經曰寸口脈從少陰斜至太陽是陽維脈也動苦肌肉痹癢皮膚痛下部不仁汗出而寒又苦顛仆羊鳴手足相引甚者失音不能言宜取客主人在耳前起骨上廉開口有空乃手足少陽陽明之會又曰寸口脈從少陽斜至厥陰是陰維脈也動苦顛癇僵仆羊鳴又苦僵仆失音肌肉痹癢應時自發汗出惡風身洗洗然也取陽白金門僕參又曰尺寸俱浮直上直下此為督脈腰脊強痛不得俯仰大人顛病小兒風癇又脈來中央浮直上直下動者督脈也動苦腰背膝寒大人顛小兒癇宜灸頂上三壯即腦戶之類張仲景金匱云脊強者五痙之總名其症卒口噤背反張諸藥不已可灸身柱陶道大椎穴又云痙家脈築築而弦直上下行難經曰督之為病脊強而厥王海藏云此病宜用羌活獨活防風荊芥細辛藁本黃連大黃附子烏頭蒼耳之類巢氏不達內經叔和之旨妄立五癇之説一曰陽癇二曰陰癇三曰風癇四曰馬癇五曰濕癇不知癇症之發由腎肝龍雷上衝如從標而得者止在經脈不通從本而得者邪入腎間動氣夫兩腎間動氣是生氣之本臟腑之根呼吸之門也所謂生氣者陽從陰極而生即蒼天之氣所自起之分也故經曰蒼天之清淨則志意治順之則陽氣固雖有賊邪不能害也或經脈引入外感內傷於本即傷其生化之原而命門相火自下逆上塞其音聲迫出遍身之鳴與脾之涎沫湧出於口潮入於心故卒倒無知而古今論治皆不審內經之旨深可慨也劉河間以為熱甚而風燥其兼化也專清涼為主三因分六氣為外因七情為內因飲食為不內不外因丹溪主痰與熱用星半芩連為主熱多者清心痰多者行吐然後用安神平肝之劑調之歸地芎柴硃砂青黛牛黃金箔之類張子和法汗吐下並行虛而不勝三法者宜星香苓參菖蒲門冬全蠍竹瀝或龍腦安神丸犀角茯神人參麥冬各二兩冰麝牛黃各三錢馬牙硝二錢甘草骨皮桑皮各一兩金箔三十五片蜜丸彈子大薑湯下日三服因火熱者黃連麥冬茯神竹葉半夏南星柏子仁菖蒲元氣實者滾痰丸大黃二兩黃芩三兩沉香一兩礞石硝石同煅一兩水澄竹瀝薑汁神麯糊丸或參朱丸虛實可用最妙以人參蛤蚧硃砂等分為末豬心血為丸金銀湯送下晝發治陽蹻宜升麻湯麻黃連節八錢蒼朮一兩五錢炒防風八錢炙甘草五錢空心煎服夜發治陰蹻宜四物湯加柴胡栝蔞半夏南星菖蒲遠志棗仁知母黃柏空心煎服晨朝發者病在足厥陰肝平旦發者病在足少陽膽日午發者病在足太陽膀胱黃昏發者病在足太陰脾人定時發者病在足陽明胃半夜發者病在足少陰腎前方中依發時加引經藥治之千金方云先身熱瘛瘲驚啼而後發脈浮大者為陽癇在腑易治先身冷不驚掣不啼叫而病發脈沉細者名曰陰癇在臟難治劉宗厚云陰陽癇即急慢驚也陽癇者痰熱客於心胃聞驚而作若痰熱甚者雖不驚觸亦作也宜用涼劑陰癇者亦本於痰熱而用寒涼太過損傷脾胃變而成陰法宜溫補以燥濕之品治之病久而痰成窠囊須與厚朴丸厚朴川椒川烏各一兩半紫菀吳萸柴胡菖蒲桔梗茯苓官桂皂角乾薑人參各二兩黃連二兩半巴霜五錢蜜丸桐子大每服五七十丸薑湯下春夏加黃連二兩秋冬加厚朴二兩外加人參菖蒲茯苓各一兩五錢窠囊日久必至生蟲宜妙功丸服之木香丁香沉香各五錢乳香麝香熊膽各二錢五分白丁香三百粒輕粉四錢五分雄黃青皮芩連胡連各五錢黑醜三稜蓬朮雷丸鶴蝨甘草陳皮各一兩大黃一兩半赤豆三百粒巴豆七粒蕎麥麵兩半作糊每丸重一錢硃砂為衣陰乾溫水化開服輕者即愈童者不三服用治諸癇俱效然須防其再發宜十全大補湯加棗仁遠志麥冬硃砂金銀箔補其心氣經年不輟可保不發而六味丸亦不可少如脈沉小急實虛而弦急者皆不治灸法狂言不避水火間使三七壯百會九壯癲癇瘛瘲不知所苦二蹻主之男陽蹻女陰蹻晝發取陽蹻申脈夜發取陰蹻照海失志癡呆取神門鬼眼百會凡灸兩蹻各二七壯必先用藥下之乃灸否則痰氣壅塞必殺人小兒急慢驚癇切不可執持其發搐又不可混灸愚謂風癇可灸驚熱不可灸風癇之痰若灸著穴痰去心清可漸安矣每見人無術輒投艾火不惟失穴兒反增悸且小兒經絡脈道未全戒之小兒驚癇先怖恐啼叫乃發也用炷如麥大灸頂上旋毛中三壯及耳後青絡脈風癇先出手指如數物狀乃發也灸髮際宛宛中三壯豬癇病如尸厥口吐清沫灸巨闕三壯羊癇目瞪吐舌羊鳴灸第九椎下間三五壯馬癇張口搖頭身反折馬鳴灸僕參左右各三壯牛癇善驚反折手掣手搖灸手少陰掌後去腕五分陷中八怔忡驚悸恐人之所主者心也心之所主者血也心血消亡神氣失守則宅舍空虛痰因以客此怔忡之所由作也心中惕惕然跳築築然動怔怔忡忡不能自安即所謂悸也一屬虛一屬飲虛由陽氣內虛心神不足內動為悸宜人參白朮黃耆甘草茯神以養心氣虛由陰氣內虛火即妄動而悸宜參麥生地歸身龍眼以養心血飲由水停心下侮其所勝心君畏水不能自安故惕惕而悸宜茯苓白朮半夏橘紅茯神以清其痰飲或有汗吐下後正氣內虛以致怔忡者宜參耆朮草歸芍之類以補其耗散之氣血亦有邪氣攻擊而悸者宜審其為何邪而攻去之又有脈來結代是營衛不行非補氣血生津液者不能治也心為君火包絡為相火火為陽陽主動君火之下陰精承之相火之下水氣承之如是則動得其正而清淨光明為生之氣也若之所承則煩熱而為怔忡當補其不足以安其神氣未瘥則求其屬以衰之壯水之主以制陽光也各臟有疾皆能與包絡之火合動而為怔忡隨其所犯而補瀉之更須從包絡而調之平之如各臟移熱於心以致胞絡火動者治亦如之有所憂慮便怔忡者屬虛歸脾湯主之有時作時止者痰因火動也溫膽湯加黃連或二陳加枳實香茹瘦人多血虛肥人多氣虛或痰飲陰火上衝怔忡不已者甚則頭運眼花齒髮脫落或見異物鬼神之類或腹中作響皆宜滋陰降火宜六味加知柏茯神棗仁養心之品日服降火藥不愈者是無根失守之火宜八味丸亦有所求不遂或過縱自悔噓嗟夜語若有所失者宜以溫膽湯加人參柏子仁為丸辰砂為衣日三服胸中否塞不能飲食心中如有所怯者喜居暗室或倚門後見人即畏避無地此名卑惵之病專由於血不足也宜人參養營湯加藿香穀芽驚悸恐各有不同驚者卒然驚觸不自知也悸者本無所驚心自動而不寧即怔忡也恐者自疑若人將捕不能獨坐臥也治之之法悸則祛其痰驚則安其神恐則定其志心為離火內陰而外陽腎為坎水內陽而外陰心以神為主腎以志為主陽火陰水心腎既濟神志自寧全在陰精上奉以安其神陽氣下藏以定其志驚氣入肝黃帝問曰足陽明之脈病惡人與火聞木音則惕然而驚岐伯曰陽明者胃脈也胃者土也聞木音而驚者土惡木也因大驚而成者脈必動如豆粒而無頭尾以黃連安神丸鎮之硃砂黃連生地歸頭甘草為末蜜丸腎虛而恐人參黃耆白朮元參黃柏鹽水炒當歸熟地等膽虛而恐人參枸杞棗仁柏子仁熟地五味桂半夏茯苓陳皮肝膽俱虛百藥不效鹿角膠酒化空腹下五錢極妙古人所謂肝無虛不可補補腎即所以補肝也肝藏血血不足則恐四物湯加山萸棗仁丹參圓肉胃虛則恐必宜六君子湯主之怵惕思慮則傷神神傷則恐懼自失歸脾湯主之經云精氣並於腎則恐地黃天冬枸杞遠志茯苓健忘者腸胃實而心虛心虛則營衛留於下久之不以時上故善忘歸脾湯加升柴大棗腎盛怒而不止則傷志志傷則喜忘其前言地黃歸芍丹皮遠志茯杞天冬思慮過度痰迷心竅而善忘者歸脾湯加橘半枳朮茯神硃砂心腎不交宜朱雀丸沉香五錢茯神二兩蜜丸參湯送下或交泰丸黃連一兩肉桂一錢為末蜜丸淡鹽湯送下針法心中虛惕神思不安膽俞心俞內關通里怔忡健忘不寐手少陰心虛內關針五分灸三壯神門針三分灸二七壯少海針一分九健忘經云上氣不足下氣有餘腸胃實而心肺虛虛則營衛留於下久之不以時上故善忘也又曰腎盛怒而不止則傷志志傷則喜忘其前言血並於下氣並於上亂而喜忘宜代抵當丸去其瘀血大黃四兩生地歸尾桃仁山甲元明粉各一面桂三錢為末蜜丸思慮傷脾歸脾湯挾痰加薑汁竹瀝精神短少人參養營湯參耆術草熟芍歸苓桂心遠志五味陳皮薑棗痰迷心竅導痰湯二陳加膽星枳實或二陳送壽星丸琥珀膽星硃砂豬心血薑汁丸參湯送下上盛下虛以丹參麥冬茯神遠志人參黃耆甘草升柴水火不交宜朱雀丸見前稟賦不足以致健忘孔聖枕中丹遠志肉石菖蒲龍骨龜甲等分為末酒服三錢又方石菖蒲遠志肉等分為末戊子日服二錢令人不忘丁酉日密自往市買遠志戴帽中歸然後為末酒調服勿令人知治忘如神十不能寐經曰衛氣留於陽則陽氣滿不得入於陰則陰氣虛故目不瞑也衛氣留於陰則陰氣盛不得入於陽則陽氣虛故目閉也難經云老人臥而不寐少壯寐而不寤少壯者血氣盛肌肉滑氣道通營衛之行不失於常故晝日精夜不寤也老人血氣衰氣肉不滑營衛之道澀故晝日不能精夜不得寐也經曰諸水病者故不得臥臥則驚驚則咳甚陰虛目不瞑內經飲以半夏湯一劑陰陽已通其臥即安以流水千里以外者八升揚之萬遍取五升炊以葦薪沸則置秫米一升半夏五合徐炊令竭為一升半去滓飲汁一小杯日三服以知為度病新發者覆杯則臥汗出已矣久者三飲而已矣又云胃者六腑之海其氣下行陽明逆不得從其道故不得臥也故曰胃不和則臥不安此之謂也白朮陳皮茯苓砂仁生薑仲景治虛煩不眠酸棗湯主之棗仁甘草知母茯苓川芎生薑振悸不得眠半夏制茯苓陳皮甘草芡實竹茹虛勞煩熱不得眠棗仁二兩研水二盞絞汁同半夏二合煮糜入地黃汁一合再煮時時與服煩躁不得眠六一散加牛黃脾虛不眠寒也棗仁炒末竹葉湯調服膽實多睡熱也棗仁研末薑茶湯調下臥而多驚邪在肝膽羌活勝濕湯參耆甘苓羌獨芎藁防蔓辛薄柴等治之大凡怔忡失志驚悸健忘心風不寐皆系膽涎沃心或因心氣不足反以涼心大過心火益微痰涎愈盛惟以理痰順氣為第一義導痰二陳加枳殼南星菖蒲喘不得臥蘇子橘紅桔梗甘草竹茹厥陰不得臥宜牛膝丹皮苡仁沉香官桂木通之類總之補肝和胃二法盡之矣針法灸法見前怔忡門十一不能食胃氣盛則能食而不傷過時而不飢脾胃俱虛不能食而瘦脾胃俱旺則能食而肥凡不能食必作虛論一作火衰脈緩怠惰肢重泄瀉濕也二朮茯苓陳皮甘草厚朴薑棗脈弦氣弱自汗肢熱泄瀉毛枯發脫虛而熱也虛火可補參耆朮草苓芍山藥陳皮之品脈虛氣弱四君子加半夏炮薑虛而有痰六君子加薑汁痰積痞膈而不能食皂角燒存性研末酒下脾虛不運而不能食切不可消克宜以異功散調之或嗜食太過脾胃痞滿不食枳朮丸亦不可多服或服補藥未效加香附老年食滯宜用木香乾薑丸白朮二兩枳實一兩乾薑七錢木香五錢荷葉煎湯調打神麯糊為丸或以補骨脂肉豆蔻各二兩神麯糊丸服又方菟絲子淘淨酒浸曬乾為末酒服三錢十日外飲啖如湯沃雪或用八味丸補命門之火以壯脾土為進食妙劑中焦是治自無前症矣亦有心腎不交以致脾失健運宜鹿茸橘皮煎丸橘皮十兩去白為末又用五斤不去白於磁鍋煮汁去渣如飴聽用鹿茸菟絲吳萸乾薑厚朴蓯蓉巴戟附子萆薢石斛牛膝杜仲陽起石各三兩炙草一兩已上各如法制共為末入前飴並皮末搗和丸桐子大空心鹽湯下三十丸惡聞食臭大劑參術各須用薑汁拌炒煎服宜資生丸人參白朮苡米仁各三兩橘紅山楂神麯各二兩白茯苓芡實各兩五錢山藥麥芽白扁豆蓮肉各二兩黃連肉蔻各三錢半桔梗藿香甘草各五錢蜜丸重二錢每一丸空心細嚼薑湯下針法內關中脘足三里內庭公孫又法灸間使三十壯若四肢厥冷脈沉不至乾嘔不食粥藥皆吐灸之快通此起死回生之法也十二自汗盜汗內經云陽氣有餘為身熱無汗陰氣有餘為多汗身寒陰陽有餘則無汗而寒此平人也又云飲食飽甚汗出於胃驚而奪精汗出於心持重遠行汗出於腎疾走恐懼汗出於肝搖體勞苦汗出於脾臥而出汗醒則倏收名曰盜汗不因發表不因動作自然汗出名曰自汗夫心之所藏在內者為血發於外者為汗自汗之症未有不因心腎俱虛而致若陰陽虛則腠理髮熱自汗此陰陽偏勝而致又有傷風中暑驚恐房勞歷節風濕腸癰痰飲産褥諸症亦能自汗仲景云肉極則津脫腠開汗大出巢氏曰勞症陽虛津泄多汗又云心熱則腠理開而汗出蓋心之陽不能衛外而為固則自汗出腎之陰不能退藏而為密則盜汗出肺主氣又主皮毛司腠理肺虛則表不能衛而自汗出邪在於內則玄府不閉則汗從腎府出邪在於表則腠理不肥而汗從經絡出臟腑之陰拒格衛氣浮散於外無所依從則汗出胃虛水穀之氣脫散則自汗出陰虛陽必湊故發熱自汗當歸六黃湯主之陽虛陰必乘故發厥自汗黃耆建中湯主之身冷自汗陰躁欲坐臥於泥水中脈浮而數按之如無經曰脈至而從按之不鼓諸陽皆然此陰盛格陽也真武湯水冷與服尺膚澀而尺脈滑營血自涸者多汗又津脫者汗大泄宜調衛湯痰多汗自出痰消汗自止理中降痰湯火氣上蒸胃濕作汗涼膈散氣不順則汗小建中湯加木香芍藥官稜炙草薑棗飲酒中風則為漏風而多汗白朮散牡蠣白朮防風黃耆病後氣血俱虛或産後氣血俱虛自汗者十全大補湯別處無汗惟心孔一片有汗此必思慮傷心也獖豬心一具破開帶血入人參歸身各一面用線縫煮熟去藥食心仍以艾湯調茯苓末服如是三服取效倘諸藥止汗不效但理心血液汗乃止十全大補湯加棗仁遠志肉五味硃砂鎮攝心神為主若汗出如珠如膠而淋漓揩試不逮者皆不可治頭汗出齊頸而還血症也額上偏多者首為六陽之會蒸熱而汗也左頰屬肝右頰屬肺鼻屬脾土頦屬腎額屬心三焦之火涸其腎水其外溝渠之水陽否隔上下奔迫治迫而上行於心故額偏多而心血不足也丹參當歸生地茯神棗仁白芍黃耆枸杞圓肉手足汗多氣熱也白朮黃連牡蠣亦有氣弱者汗多冷十全大補湯或挾風痰者加白附子川烏盜汗陽衰則衛虛所虛之衛行於陰當目瞑之時無氣以固其表則腠理疏而汗醒則行陰之氣而復於表汗自止故名盜汗又名寢汗傷寒陽明病脈沉實有力潮熱自汗脈略浮者必盜汗又三陽合病因合則汗傷寒盜汗非雜症之責其陰虛也邪在半表半裡小柴胡火氣上蒸胃濕自汗亦非陽虛宜以涼膈散自汗陰蒸於陽玉屏風散盜汗陽蒸於陰當歸六黃湯虛人加黃耆減芩連身熱加骨皮秦艽肝虛加棗仁肝實加膽草煩心加連辰砂麥冬竹葉脾虛加朮芍山藥去芩連灸法諸汗灸膏肓大椎復溜針列缺雲門傷寒自汗及當汗不汗補合谷傷寒汗多不止瀉內庭合谷補復溜百勞傷寒無汗及自汗發黃瀉復溜內庭補合谷虛弱人盜汗不止瀉合谷補復溜十三關格關者陰盛之極故關閉而溲不得通也格者陽盛之極故格拒而食不得入也經曰上下不通則暴憂之病也又曰傳化不行上下不並良醫弗為身半以上陽氣常在則熱為主病身半以下陰氣常在則寒為主病忽然生逆二便不通甚則煩亂身冷無脈此氣閉也與大承氣湯則便通吐止脈和矣脈虛人倦人參茯苓半夏陳皮甘草生薑水煎入冰麝少許服脈沉細肢冷參附加冰麝為末糊丸每服十丸脈數有熱五苓散加梔子大黃厚朴枳殼檳榔木通陳皮生薑水煎入冰麝少許服又法皂角燒存性為末米湯送或豬脂二兩煮食十四厄逆刺鼻取嚏即止遇大驚亦止傷寒汗吐下後與瀉利日久或大病後氣厄中氣虛也虛而熱者人參竹茹陳皮甘草生薑大棗虛而寒者人參白朮甘草乾薑附子丁香柿蒂大便閉脈沉數者調胃承氣厄而心下悸者半夏陳皮茯苓甘草南星木香竹瀝薑汁丁香柿蒂煎服久病虛人見之為危火厄水煎乾柿湯加老生薑服厄厄連聲為實可治厄間半時再厄為虛難治肺脈散大者死十五霍亂霍亂者心腹脹痛嘔吐泄瀉憎寒壯熱頭痛眩暈先心痛則發吐先腹痛則發瀉心腹俱痛吐瀉並作或手足冷或自汗甚則轉筋入腹則死多因中氣不足或內傷七情外感六氣或傷於飲食往往發於夏秋陽熱迫於外陰寒伏於內使人陰陽反戾清濁相干陽氣暴升陰氣頓墜陰之之法滲脾胃之濕散諸邪之氣然脾胃有虛有實感邪有陰有陽宜消息施治內經云太陰所至為霍亂又曰土鬱之發民病霍亂又歲土不及風乃大行民病霍亂又足太陰之別厥氣上逆則霍亂且巢氏病源乃曰霍亂由清濁相干亂於腸胃因飲食而發者心腹絞痛因風寒而發者身體疼痛因於心者但心腹痛而已如是而內經之旨不復問矣劉河間專主火熱張子和則以風濕暍三氣合為病邪蓋土濕為風木所克又為炎暑鬱蒸致嘔吐者暑熱之變也泄瀉者土濕之變也轉筋者風木之變也合衆論而參治庶為活法安可執一説以誤人耶羅謙甫於牆陰掘地約二三尺深取土入新汲水攪之澄清名曰地漿服之則氣和而吐瀉自止若多食涼水瓜果所致宜藿香木香厚朴陳皮蘇葉生薑若四肢重著骨節煩疼因於濕也二朮朴陳茯澤車前若七情鬱結宜烏藥香附木香枳殼厚朴陳皮蘇子若手足厥逆氣少神清者寒也四逆湯加食鹽如轉筋者風木克脾土也平胃散加木瓜如身熱煩渴氣粗口燥面垢者暑也香薷黃連厚朴陳皮甘草生薑煎好澄冷服如食滯者腹痛不可近香砂二朮枳實豆蔻在上者吐之食鹽湯在下者加大黃瀉之通用藿香香薷砂仁厚朴半夏茯苓甘草陳皮生薑復庵用蘇合香丸以通其否塞次進藿香正氣散加木香煎吞來復丹若瀉甚則勿用來復丹若瀉而不吐胸悶濃鹽湯探吐如已吐未吐並可用正氣散或間進蘇合香丸如吐而不瀉心腹大痛頻欲登圊苦於不通宜木香枳殼枯梗煎服若膈而不下來復丹引導下行吐瀉不止元氣耗散病勢危篤或米粒不入或口渴喜冷或惡寒戰掉手足逆冷或發熱煩躁揭去衣被此內虛陰盛不可以其喜冷去被為熱宜附子理中湯甚則四逆湯並須冷服霍亂已透而余吐余瀉未止腹有餘痛宜一味扁豆葉煎服如胸痛甚因吐不透橘紅鹽各一兩服大吐瀉後虛煩而渴津液枯竭人參麥冬花粉乾葛甘草茯苓煎服乾霍亂飛鹽四五錢調童便服此良法也遲則難救所謂乾霍亂者心腹脹痛煩躁憒亂不吐不瀉是也俗名攪腸沙此土鬱不發泄火熱內熾陰陽不交皆為火極之故或云方論皆言宿食與寒氣相搏何以獨指火乎曰悶亂煩痛故經云諸躁狂越皆屬於火者乎又卒暴之病亦屬於火者乎但攻之太過則反悍格須反佐以治然後火可散耳古法有用鹽煎童便非第用其降火亦兼取其行血故妙妊孕霍亂先吐或腹痛吐瀉是因於熱也頭疼體痛發熱是挾風若風犯皮膚則氣不通而風熱上衝必為頭疼若風入脾胃則瀉利嘔吐甚則手足逆冷妊婦患此多致損胎薛立齋云如內傷飲食外感風寒霍香正氣散若只因食滯半胃散若陽氣虛寒手足逆冷溫補為急理中湯産後霍亂腑臟虛損飲食不消感冒風冷所致若熱而欲飲水者五苓散若寒而不欲飲水者理中湯虛冷者理中湯加附子或來復丹凡霍亂初起及新愈不可便與穀氣每致殺人如吐瀉已多元氣困極審無邪在須米飲補養脈洪大者吉如脈見微細而舌卷囊縮者不治霍亂之後陽氣已絶或遺尿或氣乏不語或汗出如珠或躁欲入水或四肢不收皆為死症霍亂欲死灸法肘尖七壯取令病人端坐又手平胸肘後突出尖骨罅中是穴用指甲按切酥酥麻為真背後灼艾針法將委中出血又法以水將手拍兩腿彎立止十六脹滿黃帝曰心腹滿旦食則不能暮食此為何病岐伯曰名為鼓脹夫鼓之為脹其中空無物外皮繃急取譬而氣虛滿者乃為切當又曰厥氣在下營衛留止寒氣逆上真邪相攻兩氣相搏乃合為脹也脈要精微論曰胃脈實則脹本神篇曰脾氣實則腹脹經溲不利陰陽應象大論曰濁氣在上則生䐜脹此內經論實症有三也經脈曰是太陰之別虛則鼓脹按公孫穴道太陰陽明論曰食飲不節起居不時者入五臟則䐜滿閉塞此內經論虛症有二也經脈篇曰胃中寒則脹滿異法方宜論曰臟寒生滿病風論曰胃風鬲塞不通腹善滿失衣則䐜脹六元正紀大論曰太陰所至為稸滿此內經論寒症有四也至真要大論曰少陰之司天少陰之勝復少陽之司天少陽之勝復又曰熱勝則腫又諸脹腹大皆屬於熱此內經論熱症有四也脹有五臟六腑經曰心脹者煩心短氣臥不安肺脹者虛滿而喘咳肝脹者脅下滿而痛引小腹脾脹者善噦四肢煩悗體重不能勝衣臥不安腎脹者腹滿引背央央然腰髀痛胃脹者腹滿胃脘痛鼻聞焦臭妨於食大便難大腸脹者腸鳴而痛濯濯冬日重感於寒則飧泄不化小腸脹者少腹䐜脹引腰而痛膀胱脹者少腹滿而氣癃三焦脹者氣滿於皮膚中輕輕然而不堅膽脹者脅下痛脹口中苦善太息然臟腑雖各有脹而無不本於肺脾腎三臟者肺屬金主氣脾屬土主運化腎屬水主五液故五氣所化之液咸本於腎五液所行之氣咸本於肺轉輸於金水二家以制水而生金者咸本於脾是以腫脹之症無不由此三者但陰陽虛實治法各殊先脹於內後發於外多實先腫於外後甚於里者多虛小便黃赤大便猶結者多實小水清白大便稀溏者多虛脈滑數有力者多實形色紅黃氣息粗長者多實容顏枯稿音聲短促者多虛已上諸症不可不辨實熱論治濁陰出下竅不病之常也膏粱酒客濕熱內郁陰火上衝濁陰不降三焦不通二便不利脹乃生焉經乃所云中滿者瀉之於內又曰下之則脹已又曰治平權衡去菀陳莝開鬼門潔淨府宣五陽巨氣乃平如硝黃實朴去菀陳莝之劑也豬澤通茯醜戟芫遂潔淨府之劑也桂附薑吳宣布五陽之劑也然熱有重輕實有大小及致病之由此當明辨隨症施治仲景云腹滿不足不當下之腹滿發熱飲食如故者下之虛寒論治脾為太陰司地道陰水之化脾陰太過違天道陽火之化蓋無陽不能運行三焦腐熟水穀乃為脹滿治宜辛熱分消湯黃耆吳萸厚朴草蔻黃柏益智木香半夏升麻人參茯苓當歸黃連澤瀉麻黃乾薑附子畢澄茄附子理中湯金匱腎氣丸皆可用之治脹三法陰從下逆上而盛於中者先抑之而後調其中此血不足而火亢之症陽從上降下而盛於中者先舉之則調其中此氣不足而陽陷之症邪從外入內而盛於中者先治其外而調其內此六氣成脹也藿香正氣散藿香腹皮紫蘇白芷厚朴桔梗陳皮半夏茯苓甘草加生薑燈心煎服如七情成脹沉香降氣散沉香烏藥香附砂仁甘草加食鹽或木香調氣散木香藿香砂仁豆蔻甘草加生薑煎服如飲食傷成脹者香砂調中湯二陳平胃與香砂枳實青皮山楂神麯如畜血成脹者青紫筋見小水仍利代抵當丸桃仁蓬朮大黃生地當歸芒硝女人先因經斷而後腫脹血結胞門病發於下血分丸椒仁甘遂續隨子附子吳萸郁李黑醜靈脂元胡歸尾各五錢芫花一錢蚖青十枚去頭翅足米炒螌蝥十枚膽礬砒各一錢石膏二錢為末糊丸芡實大陳皮湯送一丸腸覃者寒氣客於腸外與衛氣相搏瘜肉乃生小如雞卵大如懷妊月事以時下宜氣藥調之氣脹方雞內金大雄雞者炙五錢真沉香八錢砂仁一兩為末薑湯送下覃音尋石瘕者生於胞中寒氣客於子門惡血留止日以益大月事不以時下宜以血藥行之血脹方蓬朮元胡鬱金五靈脂黑醜牛膝穿山甲肉桂為末醋糊丸酒送下女人屬氣分脹者先病脹而後經水斷心胸堅大病發於上宜治氣分枳殼陳皮桔梗木香檳榔香附烏藥砂仁白朮蒼朮半夏茯苓紫蘇官桂生薑煎服為末亦可脹病必喘喘則必脹二症相因但先脹而後喘治在脾先喘而後脹治在肺治脾用蒼白朮厚朴枳實腹皮砂仁木香沉香治肺用桑皮葶藶白蔻枳殼蘇子桔梗陳皮如利小便用木通車前豬苓茯苓通草防己澤瀉名潔淨府也如欲發汗用麻黃羌活葛根防風紫蘇名開鬼門也如人強能食少年初病其脈有力者可暫投硝黃遂戟與商陸芫花等亦宜酌用脹起於旬日之間忽然因七情六氣而成者實也當疏利為主已上諸法可用脹起於經年纍月先腫於外後脹於內小便淡黃大便不結色澤枯稿神倦懶言脈細無力虛寒症也人參白朮茯苓甘草陳皮以補脾也黃耆桔梗苡仁山藥以補肺也沉香木香砂仁陳香圓以理氣也五苓散以利小便升柴以開鬼門如虛盛多寒者桂附薑吳俱宜審用人參白朮須大劑頻投方能有救金匱腎氣丸是乃切要之方至於以白芍於土中瀉木忍冬能和緩下氣赤豆木瓜利水與下氣交長片腦雞金寬膨與溫中並用牙皂角燒灰為末假神麯糊為丸取利甚捷雞屎白炒熱袋盛浸酒須空腹而飲下水大奇青蛙入豬肚中烹為佳饌野雞和椒茴末面作餛飩皆海藏之仙方屢用之而屢效脈實大浮洪者易治沉細微小者難痊身熱脈大腹脹為逆腹脹便血脈大為逆發熱不休寒熱如瘧皆不治或腹大肢冷泄瀉三症並見不及一時死若脹則上嘔而喘咳下而泄瀉脈微或大為逆不治腹脹多是氣虛不斂用辛散之品反甚宜以酸收之白芍五味之屬少佐益智以其能收攝三焦元氣也朝寬暮急以當歸為主暮寬朝急以人參為主朝暮俱急二味並用按之有痛處乃瘀血也加行血藥經云濁氣在上則生䐜脹又云下之則脹已謂宜以沉降之品引濁氣在上者而下之非通利大府之謂也凡腫脹初起痰多發喘小便不行服濟生腎氣丸無不效脾胃氣虛心腹脹滿灸法取太白足三里水分氣海又法先灸中脘七壯引胃中生髮之氣上行陽道兼服東垣木香順氣湯使濁陰降而脹平矣虛勞浮腫針太衝腎俞朴之小腹脹滿三陰交三里內庭單脹石門氣海內庭雙脹合谷曲池支溝氣海三陰交一切水腫針水溝灸用水分氣海天樞十七肩背痛經曰西風生於秋病在肺俞在肩背其分野所屬故也又云肺氣有餘則肩背痛風寒汗出虛則肩背痛而寒少氣不足以息又云少陰司天熱淫所勝痛在肩背缺盆又云邪在腎則肩背痛是腎氣逆上也歲火太過肩背熱痛即少陰司天金為火賊故也宜二冬知地甘桔歸芩如風寒汗出肩背痛小便數宜防風湯升柴羌藁參耆青陳白蔻黃柏虛者去柏加桂枝肩背痛不可回頭此小腸氣鬱也宜用風藥散之有因看書對奕所致者宜十全大補湯加枳殼桔梗理其滯氣風熱乘肺而痛宜荊防牛蒡粉芩桔殼如短氣小便自遺者虛也補中益氣湯濕熱項強連背者宜拈痛當歸湯羌防升葛二朮歸甘參桂知芩澤茵苦陳常肩背冷痛一片痰飲凝積也宜消之導痰湯加木香香附桔枳開散倍以白芥子腎氣逆上痛引肩背沉香肉桂青鹽牛膝川椒小茴茯苓膀胱夾脊脈道六味湯加肉桂苡仁芡實十八臂痛六經分治兩手伸直貼身垂下大指居前小指居後屬前廉系陽明升麻乾葛白芷後廉系太陽經羌活藁本外廉系少陽柴胡內廉系厥陰柴青內前廉系太陽升麻蔥白白芷內後廉系少陰細辛獨活痛有風濕所搏寒邪所襲者宜白芷荊芥芎歸甘桔枳朴芍藥乾薑蒼朮桂枝痛有挈重傷筋宜八珍湯加官桂丹皮胡索寄奴木瓜片薑黃痛有痰飲流注患處冷而不熱輕者導痰湯加木瓜片薑黃重者控涎丹針法肩膊背及兩臂紅腫痠疼俯仰不便牽引作楚用肩外俞肩井肩髃脾縫曲池灸法凡背痛多作勞所致技藝辛苦之人與士子攻苦及閨閣針指女工者有之亦有色勞者如晉之景公是也風濕流注於太陽未必非勞苦時所感也大凡背及肩背痠疼當灸膏肓肩井肩髃無不效驗背脊心紅腫痛肩井肺俞風門五樞宜與痛痹門參看十九脅痛肝合於胠脅故脅屬肝然筋經所過則挾邪而痛亦有多端不可執也且左右為陰陽之道路故肝主陰血而屬左脅肺主陽氣而隸於右脅左脅多怒傷或瘀血作痛右脅多痰氣或鬱結作痛其間七情六淫之犯飲食勞動之傷皆足以致痰凝氣結血留不可以痰氣專主於右左脅專主瘀血要知痰氣與血相搏而為痛也肝氣宜順而不宜逆逆則痛痛不止而死矣故治脅痛必須平肝平肝必須補腎腎水足而後肝木有養其氣自平而脅痛止矣宜肝腎兼資湯熟地一兩白芍二兩當歸一兩白芥子三錢梔子炒一錢山萸肉五錢甘草三錢水煎服此方補腎為主滋肝佐之兼理痰火一劑而脅痛止傷寒少陽脅痛小柴胡湯不大便加枳殼不因傷寒脅痛身體發熱枳殼桔梗細辛川芎防風乾葛甘草蓋枳殼為脅痛的劑所以諸方皆用之脅痛而氣喘分氣紫蘇飲紫蘇桑白皮五味桔梗腹皮草果茯苓陳皮甘草薑煎服怒氣傷肝柴胡疏肝散川芎柴胡香附芍藥枳殼陳皮甘草煎服悲傷肺氣而脅痛推氣飲薑黃枳殼桂心甘草為末薑棗湯送下瘀血痛者日輕夜重午後發熱脈澀而短桃仁承氣湯加鱉甲青皮白芥子僕跌傷方同上痰飲脈沉滑弦導痰湯加白芥子甚者控涎丹下之食積脅痛必有一條扛起香砂枳朮加楂朴曲芽末丸服痃癖脅痛煮黃丸巴豆炮去皮心五錢略去油雄黃一兩同研如泥入白麵二兩水丸麻子大每用十二丸湯煮入冷漿湯沉冷一晝夜盡十二丸冷漿下微利為度不必盡劑附治驗一人受暑脅痛皮黃髮泡清肝理氣俱不效用大瓜蔞搗爛加粉草紅花少許入口而痛即止又讀王字泰筆塵所載秦文山掌教平湖與家兄同官因勞而兩脅痛清晨並飢時尤甚以書介家兄求余方余意其肝虛當補其子母用耆朮芎歸萸熟棗藥柏仁之類仍以細辛防風各少許薑棗煎服叮嚀此方勿示他醫恐令其笑不合口也無何而秦君貽書來謝云服不數劑而痛止余家長安時聞魏昆溟吏部之變亦因投謁忍飢歸而脅痛他無所苦而粗工以青皮枳殼之類雜投遂至不起籲可不鑑哉司命者貴識圓通也執成説之害大矣針法怒傷肝氣血不歸原脅痛不止取行間期門肝積氣塊脅痛及臟腑虛冷兩脅刺痛取支溝章門陽陵泉臨泣胸脅痛不可忍取章門期門行間丘墟兩脅下痛奄奄欲絶此為奔豚急以熱湯浸兩手足頻頻易之次灸氣海關元期門各百壯二十腳氣腳氣之病前古未聞起於後世其頑麻腫痛者經所謂之痹厥也其衝心者經所謂厥逆也其痿軟不收者經所謂痿厥也東垣云腳氣實由水濕然亦有二焉一則南方卑濕經曰清濕襲虛則病起於下此自外而感者也北方常食牛乳或飲酒過度脾胃有傷不能運化水濕下流此自內而致者也楊大受云腳氣為壅疾治宜宣通不使壅也壅既成者砭去惡血然後服藥南方腳氣外感寒濕北方腳氣內傷濕熱此前人所未發者千金方云腳氣之病初起甚微人多不覺而飲食如故獨卒然腳弱或腫痛腳氣之病初發頗似傷寒有壯熱頭疼惡食嘔吐或腹不快或二便祕或腹痛下利或昏憒錯亂或轉筋攣急或頑麻緩縱或上腫或下反不腫或少腹不仁皆其候也並作腳氣治腫者為濕腳氣不腫者為乾腳氣總以除濕湯為主半夏蒼朮厚朴藿香茯苓陳皮白朮甘草木瓜檳榔薑棗煎服乾者加卜子濕者加青皮前廉陽明經白芷升麻葛根後廉太陽經羌活防風外廉少陽經柴胡內廉為厥陰經青皮吳萸川芎內前廉太陰經蒼朮白芍內後廉少陰經細辛獨活風勝者自汗走注脈浮弦越婢加朮湯麻黃湯合芍藥甘草薑棗如惡風加附子脈微弱風引湯參苓朮附薑桂同麻黃石膏甘草川芎吳萸獨活秦艽細辛杏仁防己防風寒勝者無汗攣急掣痛脈沉澀小續命湯麻黃防己防風桂附參芎芍芩杏加薑棗或牛膝丸牛膝二兩川椒五錢附子一錢虎脛骨五錢末丸酒服濕勝者腫疼重著脈濡細除濕湯見前暑勝者煩渴身熱脈洪數用清暑益氣湯加參麥各三分五味五粒腳氣雖宜宣通太過反能下注損脾如初發一身盡痛便溺阻隔先用導氣羌活湯羌獨己實歸黃加耆蒼升柴後用當歸拈痛湯羌防升葛二朮茵陳甘苦知豬澤歸加參如飲食不消心下痞悶開結導飲丸朮半苓陳曲芽青實乾薑末丸服腳氣衝心火氣逆上也丹溪用四物加炒柏又用附子末津調湧泉穴虛熱者金匱腎氣丸實症檳榔為末童便調服或檳榔木通牛膝沉香為末薑湯送下養正丹下氣甚捷宜酌用針法一切寒濕腳氣三里陽陵泉風市三陰交丘墟絶骨崑崙兩膝紅腫膝關膝眼三里委中陰陵泉腳背紅腫崑崙丘墟臨泣太衝行間腳氣風冷搏於經絡也風毒之中人因汗出腠理空疏邪得乘之而入或先中手足十指或先中足心足根或中膝脛初覺即宜急灸所覺處二三十壯或三里絶骨為要穴也灸法腳氣灸風市五百壯不復發一日灸之忽覺有蟲自足心行至腰間即暈絶久方蘇醒此真腳氣也附兩足轉筋灸陽陵泉承山三陰交一法灸腳踝上一壯內筋急灸內踝四十壯外筋急灸外踝四十壯又法用照海二十一遺精內經曰腎者主水受五臟六腑之精而藏之又曰腎者主蟄封藏之本精之處也又曰厥氣客於陰器則夢接內蓋陰器者宗筋之所繫也而脾胃肝腎之筋皆結聚於陰器然厥陰主筋故諸筋統屬於肝也腎為陰主藏精肝為陽主疏泄故腎之陰虛則精不藏肝之陽強則腳氣不固若遇陰邪安於其竅與所強之陽相感則精脫失而成夢泄矣病之初起亦有不在腎肝而在心肺及在心肺脾胃之不足者然必傳於腎肝而後精遺也陽虛者補其氣陰虛者益其精陽強者泄其火隨其因而俾其偏夢失之因於真陽不固故精脫之後其氣未能卒復不比人之內接而氣易可復也思慮傷神則流淫不止又思想無窮所欲不得而為白淫治法有五神氣浮遊用辰砂龍骨磁石之類以鎮墜之思久氣結成痰心竅閉塞宜豬苓丸半夏一兩破如豆大豬苓一兩同拌炒勿焦為末糊丸桐子大空心鹽湯下思想傷陰大鳳髓丹黃柏二兩砂仁一兩甘草五錢豬苓半夏茯苓蓮鬚益智各二錢半芡實糊為丸思想傷陽宜鹿茸蓯蓉鎖陽菟絲之類陰陽俱虛者人參茯神遠志棗仁蓮子芡實菖蒲當歸生地麥冬菟絲知母黃柏又思欲不遂宜妙香散黃耆遠志山藥茯神各二兩人參甘草桔梗各五錢木香二錢五分辰砂三錢麝一錢為末熔黃蠟四兩加茯苓末四兩作塊同煎服色欲過度腎虛不禁四君子湯加山藥黃耆五味遠志枸杞巴戟鹿茸龜甲或六味丸加五味牡蠣龍骨人參蓯蓉菟絲又有壯年盛滿寡欲而溢泄者黃柏知母生地茯苓黃連蓮子菖蒲遠志澤瀉大凡身熱而脈洪或滑皆因於熱知柏豬澤二冬茯神生地蓮子竹葉木通之類凡屬積滯瘀熱等疾貴在疏泄不知其理但用固澀反增其病矣惟滾痰丸下之最宜更與滋腎丸及木通豬苓之類無不立愈或用豬苓丸亦可脾胃濕熱之人及飲酒厚味太過痰火為患多致遺泄宜蒼白二陳加知柏升柴俾清升濁降脾胃健而遺泄止矣又有鬼魅相感之症由正氣本虛欲心妄動邪因乘之其狀不欲見人如有晤對或言笑歌哭脈息乍大乍小乍有乍無或兩手如出兩人或尺寸各為一等或脈來綿綿不知度數而顏色不變皆鬼邪之候也人參茯神遠志養其正生地當歸棗仁安其神硃砂雄黃沉香安息香麝香鬼箭羽虎頭骨闢其邪移寢室於向陽用多人作伴焚奇香不絶乃其治也仲景治手足煩熱咽乾口燥或為悸衄此陽上升而不降陰獨居而在內則為夢失小建中湯和之此世俗昧也凡脫精不止固澀無功當瀉心火清理不愈則用升舉升柴二活甘以緩之甘草大棗酸以收之茱萸五味棗仁烏梅之類蓮鬚金櫻子桑螵海螵龍骨牡蠣固澀之品知柏二冬芩連竹葉山梔清降之屬虛而不禁氣衰火微益智茱萸人參黃耆枸杞骨脂蓯蓉胡桃韭子鹿茸桂附之屬擇而用之可也夢失久而玉關不閉精竭而命亡矣俗惟以澀為事如澀而不止奈何始於未甚之時大用補氣補精之藥不至於久而不禁此方保精用芡實山藥各一兩蓮肉五錢茯神二錢棗仁炒三錢人參一錢水煎服先將湯飲之後加白砂糖五錢拌入渣內同食日日連服不半月而止矣品味平和淡而不厭收功獨神也針灸法遺精白濁心俞腎俞膏肓三里關元中極氣海三陰交精宮即關元之對背脊處是穴二十二赤白濁內經無赤白二濁之名但云思想無窮所願不得意淫於外入房太甚發為白淫又曰脾移熱於腎則赤白從溲而下此濁之源流也靈樞云中氣不足溲便為之變考內經之論雖屬腎家精氣下流因於脾病者亦復不少夫腎主閉藏以慳用事志意內治則精藏而固若勞逐於外思竭於內及脾熱移殃氣濕下陷則精氣離宮淫泆不守輒隨溲溺而下為濁病也濁之為症莖中熱痛渾如火灼刀刺而溲溺仍清惟竅端時流穢濁如膿淋瀝不斷由敗精瘀腐者十之七八由濕熱流注與脾虛下陷者十之二三不知其故以五苓八正雜投因而增劇者而卒不改殊可嘆也赤者屬小腸火本於心虛有熱由思慮而得之生地麥冬骨皮竹葉黃耆山藥五味夫精亦血所化有濁去太多精化不及赤未變白故成赤濁此虛之甚也曾見天癸未至強力好淫而所泄之精則繼之以血有之若溺不赤無他熱症不以赤濁為熱也參耆朮草歸地杞味萸芡菟須遠神山棗或有心經伏暑而赤濁者四苓散加香薷麥冬人參蓮肉白者屬大腸金本於氣分系腎虛有寒由嗜欲過度而得澀而痛者疏之茯豬耆朮山甘芡蓮牛膝不痛者澀之菟絲萸肉五味覆盆金櫻芡須骨脂甘草有濕痰流注者蒼朮二陳湯加升柴胃虛氣陷者補中益氣有小便如常少傾即泛濁者或溺如米泔萆薢分清飲益智萆薢菖蒲茯苓山藥菟絲烏藥加鹽煎服有稠黏如膠莖中痛甚此非熱淋乃敗精瘀塞加味清心飲苓車澤牛麥冬菖蒲益智遠志蓮心人參骨皮黃芩曾見白濁人服清利之藥不效以八味丸溫之而愈或發口渴腎水枯也六味湯合生脈散治之便溺泛濁如米泔此三消症也宜玄菟丹乃遺精白濁之聖藥亦治三消菟絲十兩酒浸搗焙為末玄參四兩五味七兩酒浸另為末白茯蓮心肉各二兩山藥六兩共末將前所浸酒打糊拌為丸米飲下四錢消渴有三總系腎水虛以致渴也不必分上中下而合治之熟地三兩茱萸二兩麥冬二兩玄參一兩車前子五錢水煎日日服之三消自愈尺脈滑數宜清利浮虛急疾者難治遲者補之小便黃赤有寒熱虛實之別素問曰諸病水液渾濁皆屬於熱宜知柏之類治之此熱症也脈經云尺澀足脛逆冷小便赤宜服附子四逆湯此寒症也靈樞曰胃足陽明之脈氣盛則身以前皆熱其有餘於胃則消穀善飢溺色黃宜降胃火又云肝熱病者小便先黃宜降肝火此實症也又曰手太陰之肺脈氣虛則肩寒痛少氣不足以息溺色變宜補中益氣湯之類以補肺氣又曰冬脈者腎脈也冬脈不及則令人眇清脊痛小便變宜地黃丸之類以助腎脈此虛症也小便遺失責在肺而不在腎蓋肺者腎之上源又其母也上源治則下流約矣甲乙經曰肺脈不及則少氣不足以息卒遺失無度故東垣謂宜安臥養氣禁勞役以黃耆人參之類補之不愈當責有熱加黃柏生地遺精淋濁灸法關元膏肓腎俞精宮三里三陰交丹田氣海大茴香丸治白濁出髓條大茴人參白茯益智白朮骨脂棗仁各炒左顧牡蠣煅等分為細末用青鹽酒糊丸梧子大每服二十九食前米飲下治虛憊便濁滴地成霜丸遠志肉蓮肉干藕節龍骨各一兩白礬煅硃砂各二錢五分為末糯糊為丸如桐子大每服十五丸空心白湯下二十三赤白帶明堂曰女人少腹痛裡急瘛瘲月事不調赤白帶下越人曰帶脈為病腹滿腰溶溶如坐水中按帶脈起於季脅圍身一周如束帶然楊氏曰帶脈總束諸脈使不妄行如人束帶而前垂此脈若固無帶下漏經之症矣女子帶下與男子精滑大同小異有胃中濕痰滲入膀胱宜健脾土燥濕化痰二陳二朮升柴之類如久而氣虛加參耆肥人多濕前方加炒黃柏瘦人多火夜熱脈數四物加炒黃柏青黛滑石蛤粉樗皮黃耆氣滯者加葵花赤用赤花白用白花滑脫不禁加牡蠣龍骨赤石脂有寒自覺加炮薑桂附若帶下小腹作痛者是鬱結痰氣下注也須兼辛收茴香炮薑之類赤者四物加椿根皮赤葵花炮薑升柴為丸椒目湯送下熱用燈心湯送下白者用二朮白葵花白芍為丸空心二陳湯下凡帶下多起於氣鬱辛能開之郁久必熱故佐以黃柏清之皆有微意輕者正治升舉之重者或通之劫之不可執一甚者宜吐以提其氣有下注頻頻腰腹以下如在冰雪中厚覆火烘猶冷肌如骨立面如枯魚小便與帶下不分眼目䀮䀮步履欹側食少痞悶是上中下三焦俱病宜大補之又云女人帶下其色有五皆因風邪入於胞門而傳傷臟腑所致也若傳於足厥陰肝經帶色如青泥傳手少陰心經帶色如紅津傳手太陰肺經帶色如白涕傳手太陰脾經帶色如爛瓜傳足少陰腎經帶色黑如衃血人有帶脈圍於腰間如束帶之狀此病由此經而來故名帶下白者屬氣赤者屬血各經見症有五色相雜者如陽氣下陷補中益氣湯濕痰下注加茯苓蒼朮半夏黃柏濕熱宜涼燥白芍椿皮丸白芍五錢椿根皮兩五錢炒黃柏二錢炒焦乾薑三錢炮黑共為末粥丸每服三五十丸空心米湯下又方蒼朮鹽水炒乾薑煨滑石炒枳殼地榆炒神麯酒麴炒各等分為末丸服米湯下或因七情所傷脈來急數者加黃連香附木香寒濕宜溫燥用草果去殼入麝少許以麵包火炮焦存性同面為末每用二錢陳皮湯調下重者三錢又方椒目白芷為末米飲下又伏龍肝梁上塵各炒令煙盡出火毒棕櫚燒存性研勻入冰麝各少許每服三錢溫酒或淡醋湯下患十年者半月可愈二十四疝內經曰任脈為病男子內結七疝女子帶下瘕聚又曰三陽為病發寒熱其傳為頽疝足陽明筋為病為㿉疝面黃脈大有虛有積名厥疝脾傳邪之腎名曰疝瘕上衝心痛不得前後為沖疝邪客於足厥陰之絡為卒疝厥陰之陰盛脈脹不通為㿗癃疝也肝所生病為狐疝心脈搏滑急為心疝肺脈沉搏為肺疝肝脈滑甚為㿉疝脾脈微大為疝氣腎脈滑甚為癃㿉又云少陰滑則病肺風疝大陰滑則病脾風疝太陽滑則病腎風疝少陽滑則病肝風疝歷觀內經總是任脈為病而肝則佐任脈之生化者也任之陰氣為疝肝之陽氣為風是以風疝並稱也凡內邪外邪之感皆能使陰陽不和陰勝則寒氣衝激陽勝則熱氣內盛悉致任脈為疝如其邪不從任脈起而諸經所受之邪亦必犯任脈也攻於臟腑則為腹中之疝會於陰器則為睪丸之疝張仲景治寒疝腹中痛及脅痛裡急者當歸生薑羊肉湯主之本草衍義稱其無不應驗豈非補肝之力與余每治病甚氣上衝心危急者以八味丸投之立應又補腎之一驗也又大便不通當利大便如許叔微羅謙甫皆用芫花是已小便不通者當利小便如許叔微治宋荀甫以五苓散是已今如纂要言不幹腎經則五苓不當用又言疝不當下則芫花不可用其所列者惟數味破氣之藥苦辛雜收寒熱無別既不能補肝腎之真陰又不能通行二竅使邪有所泄而徒耗其氣於冥冥之中且日趨於危而不覺也豈不悖哉深可痛也夫丹溪發明醫理頗多而臨症處方又多以扶植元氣為主孰意人遭厄運其手書皆不傳而傳於世者皆為盲夫俗子裁剪增續疵繆實多纂要一書其行尤甚凡丹溪長處皆為刪去大可恨也即如疝症一門首載云專主肝經與腎絶無相干而不知世所患者皆由腎虛而致肝乃腎之子而前陰則腎之竅也欲補其肝能無顧其母乎又世俗執肝無補法之説逢一疝症輒謂肝實過用征伐死者多矣今纂要中全不載一補法時師既無自悟之明又無他書足考焉得而不誤也按丹溪云疝有挾虛者脈不沉緊而豁大當以參術為主疏導佐之非補法乎巢氏所敘七疝者厥逆心痛飲食不下曰厥疝腹中滿痛氣積如臂曰癥疝得寒飲食脅腹皆痛曰寒疝腹中乍滿乍減而痛曰氣疝痛在臍旁曰盤疝臍下有積曰胕疝小腹引陰而痛大便難曰狼疝皆由陰氣積於內為寒氣所加營衛不利故成疝也又小兒啼哭不止動於陰氣結聚不散則陰核腫大而病㿉疝又有飲食不節喜怒不時津液內結而為㿗疝張子和云巢氏所立之疝與經旨不合及其立論但辨陰器與小腸膀胱腎了不相干專屬肝經受病亦分七疝之名一曰寒疝陰囊冰冷結硬如石陰莖不舉控睪而痛得於坐臥寒濕之處或冬月涉水或遇風雨畏熱貪涼使內過勞無子多欲宜溫劑下之二曰水疝腎囊腫痛陰汗如流囊如水晶或出黃水或小腹之內按之如水得之醉而使內汗出當風濕邪注於囊中宜逐水之劑下之三曰筋疝陰莖腫脹或潰或痛裡急筋攣或莖中作痛或癢或挺縱不收或精隨溲下得於房勞太過及邪術所使宜清心之藥下之四曰血疝小腹兩旁壯如黃瓜得於春夏之月燠濕之氣並勞於使內氣血流溢入胞囊中積成癰膿宜和血之劑下之五曰氣疝上連腎區下及陰囊得於忿怒啼哭則氣鬱而脹怒號即罷氣亦隨消宜散氣之劑下之小兒亦有此疾得於父衰陽瘻強力入房因而有子胎稟病也法無治治亦不效六曰狐疝臥則入於小腹行立則出腹入囊與狐之日出夜入相類故曰狐疝宜逐氣流經之藥下之七曰㿗疝陰囊腫大如斗不痛不癢得於地氣卑濕宜去濕之藥下之凡諸疝下後或調或補更有陰盛腹脹內有血膿小便不通㿉癃疝也按子和之意亦忘內經任脈為疝之本此其失一也靈樞云小腸病者小腹痛腰脊控睪丸而痛然則果有膀胱之症又安得不從此二經而成乎其失二也因執病在下者引而竭之必主下之不問虛人亦必與之攻下禍不旋踵此其失三也丹溪云睪丸連小腹急痛或有形無形或有聲無聲皆以為經絡得寒收引而痛不知其始於濕熱壅遏又外感濕熱被郁故作痛也宜枳實桃仁山梔吳萸山楂生薑濕勝成㿗疝加荔核痛甚加鹽炒大茴痛處可按者加桂枝此亦前人所未備者也大凡疝症受熱則挺縱不收受寒則牽引作痛受濕則腫脹下墜三者之間審其熱之多少而治之亦一法也腎有二睪丸亦有二又名外腎左屬水水生肝木木生心火三者皆司血分而統納左之血者肝之職也右屬火火生脾土土生肺金三者皆司氣分而統主右之氣者肺之職也故諸寒收引則血液迫泣下注於左丸諸憤鬱氣則濕歸肺下注於右丸此睪丸所絡之經非盡厥陰一經而太陰陽明之經亦入絡也往往見偏患左者則痛多腫少偏患右者則痛少腫多此亦血氣之明驗也痛多腫少當歸白芍木香茴香青皮肉桂木通之類治之痛少腫多二朮半夏茯苓木香烏藥枳殼豬苓荔核木通之類治之發明云男子疝氣女子瘕帶皆任脈所生也肝腎受病治法相同宜丁香楝實丸川楝子附子茴香歸尾各一兩酒二鍾同煮乾再焙為末每末一兩入丁香木香各二錢為末延胡索五錢全蠍十三枚去足翅炙又為末入前項末拌勻酒打糊為丸每服一錢酒送下凡疝氣帶下皆屬於風全蠍乃治風之藥川楝茴香能入小腸當歸延胡活血止痛疝氣帶下皆寒邪積聚入於小腸故用附子佐之丁香木香為嚮導也若臍下撮急及周身皆痛小便數而清諸脈急而虛獨腎脈不急而無力名曰腎疝丁香疝氣丸烏藥與丁茴延胡防桂歸羌麻同蠍草酒糊送春回疝因虛得不宜驟補先去其邪然後補之天台烏藥散烏藥及良薑青檳茴木香川楝同巴炒初起效如向川楝散川楝三十個巴豆半同炒菖蒲青木香一兩共相搗荔枝核甘枚萆薢五錢加好麝少許和鹽湯二錢調此治因感寒故借巴豆炒此惟初起者二方所宜不可施於虛人疝因鬱熱痛而便澀脈數者山梔二錢吳萸炒桃仁二七楂實炒生薑三片水同煎內郁之熱多散了小腸氣小腹引睪丸必連腰脊而痛小腸虛則風冷乘間而入邪氣入則厥而上衝肝肺控引睪丸上而不下茴香川楝吳萸陳皮馬藺花醋炒各一兩芫花醋炒共末醋糊丸每服一錢加至二錢酒送又方益智蓬朮各五錢大茴山萸牛膝續斷川芎胡蘆巴防風牽牛炒甘草各二錢五分為末每服三錢水煎空心連滓服湯調不煎亦得膀胱氣小腹腫痛不得小便是也五苓散一兩分三服蔥白一莖小茴一錢鹽八分水一鍾煎七分服三服後當下小便如墨汁續用硇砂丸木香沉香巴豆肉各一兩青皮二兩同慢火炒紫色去巴豆為末入硇砂一錢銅青三錢同研勻蒸餅丸梧子大每服七丸至十丸鹽湯空心下大凡各方多用燥濕之劑丹溪以為濕熱蓋太勞則火起於筋醉飽則火起於胃房勞則火起於腎大怒則火起於肝火鬱之久濕氣便盛濁液凝聚併入血隧流於厥經肝性急速為寒所束尤其痛甚此亦補前人之未備要知痛處喜按而減者為虛用桂枝山梔與川烏頭等分為末薑汁糊丸以川烏治外束之寒梔子治內郁之熱然不可守為揆度也針灸法大敦通主七疝兼以三陰交及灸水道尤妙女人瘕聚即男子疝氣同原胃俞氣海行間腹中氣脹引脊作痛食飲反多身體消瘦灸脾俞章門各七壯女人淋帶腎俞中封各五十壯或三陰交及中極氣海腎俞已上女人赤白帶下俱治二十五癥瘕積聚痞癖痃疝或曰癥瘕與痞癖痃疝積聚有何分別其病相似請得其詳並論其治曰癥者徵也又精也以其所徵驗及久而成精萃也王叔和脈經云左手脈橫癥在左右手脈橫癥在右昔人患癥癖死遺言令剖腹視之得腹中病塊如石文理具五色後將削成刀柄因以刀刈三稜柄消為水乃知三稜可療癥也一方蓬莪朮荊三陵酒煨煎服效又人疾體瘦喜飲鮮血謂之蝨癥無藥可療須千年木梳燒灰服或飲黃龍浴水乃瘥瘕者假也又遐也以其假借氣血而成形又歷年遐遠之謂也癥瘕腹中積塊堅者曰癥有物形曰瘕史倉公傳蟯瘕為病得之酒且內飲以芫花一撮出蟯可數升病已正義曰犬狗魚鳥不熟食之成瘕病方書云腹中雖硬忽聚忽散無有常準謂之瘕言病瘕而未及癥也經曰小腸移熱於大腸為伏瘕痞者否也如天地不交之否內柔外剛萬物不通之義也物不可以終否故否久而成脹滿而莫能療焉積者迹也挾痰血而成形迹亦鬱積至久之謂耳聚者緒也依元氣以為端緒亦聚散不常之意也痃癖者懸絶隱僻又玄妙莫測之名六書故云癖積弦急也本草陳藏器曰昔有患痃癖者取大蒜合皮截去兩頭吞之名曰內灸果獲效疝者詵也詵詵然上入而痛也素問黃帝曰診得心脈而急此為何病岐伯曰病名心疝少腹當有形也又脈急者曰疝瘕少腹痛史倉公傳臣意診之曰湧疝也今人不得前後溲中熱故溺赤又牡疝在鬲下上連肺病得之內切其脈得番陽番陽入虛里處且日死一番一絡者牡疝也方書曰三陽急為瘕三陰急為疝難經曰任之為病其內苦結男子為七疝七疝者寒水筋血氣狐㿗七者是也凡治七疝先灸大敦穴一名大順在足大拇指離爪甲如韭菜葉大乃足厥陰井也灸三壯愈大抵痞與痃癖乃胸鬲間之候積與聚為肚腹內之疾因屬上中二焦之病故多見於男子其癥與瘕者獨見於臍下是為下焦之疾故常得於婦人凡腹中積聚如塊俱為惡候切勿視為尋常而不求蚤治若待脹滿已成胸腹鼓擊雖倉扁復生亦莫能救遘斯疾者可不懼乎蚤治之法不可損傷胃氣當用和解軟堅積消痞開白朮五兩茯苓三兩神麯二兩地栗粉八兩人參五錢甘草一兩白芍三兩半夏一兩白芥子一兩卜子五錢厚朴五錢肉桂三錢附子一錢當歸二兩鱉甲一斤另為細末已上俱為細末煉蜜丸每服五錢臨臥鹽湯下即以美食壓之使下一料盡未有不療者一方枳殼去穰入巴豆一粒以麻皮扎之煮爛去巴豆焙為末治一切痞良針灸法食積血瘕痛胃俞氣海行間小兒痞氣久不愈灸中脘章門各七壯臍後脊中七壯痞塊悶痛大陵中脘三陰交脾積氣塊痛脾俞天樞中脘氣海三里腹中有積作痛大便閉灸神閥用巴豆肉為餅填入臍中灸三壯五壯二十六淋閉癃淋之為病腎虛而膀胱熱也腎氣虛則便數膀胱熱則溺竅塞窒淋瀝不快小腹弦急痛引於臍分有石淋勞淋血淋氣淋膏淋冷淋之別砂石淋如湯瓶結鹼尿難卒出宜清熱用如聖散馬藺花麥冬茅根冬葵子葶藶枳實連翹或石韋瞿麥滑石之類勞淋者遇勞即發痛引氣衝純宜補之參耆歸芍茯苓遠志鹿茸牛膝條芩生地車前之類血淋者心遺熱於小腸甚則血與溺俱下候其鼻色黃者小便難也牛膝側柏藕節生地赤芍小薊歸尾車前之類氣淋者胞內氣脹小腹堅滿溺有餘瀝石韋去毛赤芍藥茅根冬葵木香木通瞿麥滑石枳殼芒硝之類膏淋者液如脂膏精溺俱出菟絲桑螵蛸茯苓澤瀉鹿角霜之類冷淋者冷客下焦先寒戰而後便數成淋蓯蓉地黃山藥石斛牛膝檳榔官桂附子細辛黃耆黃連甘草至於小便艱難不痛而癢虛也八味丸加鹿茸人參小腹膀胱按之內痛若沃以湯澀於小便上為清涕此名胞痹赤苓細辛防風白朮桂附耆芍紫菀生地花粉甘草山茱山藥牛膝半夏獨活共為末蜜丸或腎著湯見腰痛門腎瀝湯見痹門胞痹灸法三陰交三壯宜脈大而實忌虛小而澀虛人宜補氣血勿利小便恐竭其水也小便不禁系肺氣虛不能統攝而致下陷則遺失也宜用雞䏶胵龍骨遠志菟絲人參牡蠣五味海螵蛸睡而遺尿為下元冷桑螵蛸韭子菟絲鹿茸人參之屬小便閉癃暴為閉則點滴不通久為癃則淋漓頻數點滴不通為病最急內經曰肝之脈過陰器所生病者閉癃又云督脈者女子入系廷孔男子循莖至篡所生病者不得前後又言三焦下腧入絡膀胱實則閉癃虛則遺溺又云膀胱不利為癃不約為遺溺此四經而主出者肝與督脈及三焦耳然膀胱為州都之官津液藏焉氣化則能出矣其形有上口而無下口夫主氣化者太陰肺也若使肺燥不能生水則氣化不及州都法當清金潤肺紫菀麥冬桑皮茯苓車前之類如脾濕不運而精不上升故肺不能下輸法當健胃燥脾二朮茯苓半夏之類如腎水涸熱膀胱不利法當滋腎滌熱知柏元參地黃澤茯之類夫滋腎瀉膀胱名為正治清金潤燥名為隔二之治健胃燥脾名為隔三之治又或有水液只滲大腸小府因而涸竭宜以淡滲之品分利之茯苓豬苓通澤之類或有氣滯不能通調水道下輸膀胱宜順氣為主枳殼橘紅木通之類人有實熱者非與純陰之品則陽無以化上熱梔子黃芩中熱黃連芍藥下熱黃柏知母有大虛者非與溫補之劑則水不能行如金匱八味丸及補中益氣湯是也東垣治一人小便不通目突腹脹皮膚欲裂用淡滲藥不效東垣曰疾急灸膀胱之腑必氣化乃出服淡滲而病甚是氣不化也無陽則陰無以生無陰則陽無以化淡滲氣薄皆陽藥也孤陽無陰欲化得乎以滋腎陰之品投之立愈丹溪曰吾以吐法通小便譬如滴水之器上竅閉則下竅無以自通必上竅通而下竅之水出焉氣虛者補中益氣湯先服後吐血虛者芎歸湯先服後吐痰多者二陳湯先服後吐氣閉者香附木香探吐更有瘀血而小便閉者牛膝桃仁為要藥別録云小便不利審是氣虛獨參湯如神由是觀之則受病之源自非一途若不從望聞問切察之明審之當而浪投藥劑幾何不以人命為戲耶附氣閉不通方陳皮去白末服三錢酒調下外用鹽入臍孔蔥白頭十餘根扎切指厚艾火灸之二十七前陰諸疾督脈肝脈任脈皆前陰所過之脈又太陰陽明之所合俱聚於陰器男子為玉莖女人為玉門所關甚大也寒則筋縮收入腹內此危候也桂附柴芍歸苓之屬熱則挺縱不收小柴胡湯龍膽瀉肝湯甚者小承氣湯下之陰痿者腎虛肝傷八味丸主之或保真丸熟地杜仲薑蜜炒山藥茯苓乳拌曬七次備二兩鹿膠八兩切豆大同鹿角霜炒成珠菟絲酒煮曬山萸肉各一兩半牛膝酒蒸五味炒益智小茴鹹水炒川楝酥炙遠志甘草湯泡去心巴戟酒浸去心各一兩補骨脂胡蘆巴柏子肉山甲酥炙沉香各三錢全蠍去足尾錢五分嫩蓯蓉四兩酒洗去甲及膜淨二兩酒煮成膏煉蜜和前藥末搗為丸如桐子大每服三錢酒送下前陰冰冷有汗宜補肝湯參耆苓草羌防柴葛升知柏澤蒼歸翹曲豬陳煎服陰汗不止青蛾丸杜仲四兩補骨脂四兩胡桃肉三十枚研膏入煉蜜和前末丸桐子大每服五錢砂仁湯送下外用蛇床子末同密陀僧末撲之良前陰濕癢椒粉散麻黃蛇床狗脊豬苓川椒紅花當歸肉桂輕粉共為末乾摻之內服方大蒜煨去皮研入江西淡豆豉和丸硃砂末為衣燈心湯下錢許陰囊濕癢先用吳茱萸湯洗之後用吳茱萸五錢黃柏末硫黃末各二錢寒水石三錢蛇床澤瀉各五錢檳榔枯礬白芷各三錢輕粉一錢為末撲之良陰腫痛風熱也沉香檳榔丹參白蒺藜枳殼茯苓赤芍苦參芩腫而有氣攻衝上下木香赤茯丹皮澤瀉防風檳榔郁李仁末服女人陰腫痛枳實切片炒熱絹包尉冷即易尉數次效陰吹者婦人胃氣下泄陰吹甚喧豬油八兩亂髮如拳大油煎化為度分二服病從小便出陰寒吳茱萸丁香為末塞之硫黃煎洗陰腫痛肉蓯蓉牛膝煮酒服蛇床煎洗女人疝瘕痛白芷藁本蓽茇白蘚皮羌活陽起石可服陰脫萆麻子研膏貼頂心及臍半夏為末搐鼻則上産門不合石灰炒熱淬水洗二十八後陰諸疾脫肛有瀉痢而脫者有痔漏而脫者屬虛也宜補而澀之五棓子末敷之託入如此五七次不復脫煎湯洗亦上有大腸受熱受寒皆能脫肛熱者五棓朴硝湯洗寒者香附荊芥湯洗木賊燒灰存性麝少許大便後同棓末敷之氣虛下陷用補中益氣湯大腸熱者四物湯加荊防芩連瀉久脫出補中益氣加五味訶子蓮肉煎服腫痛屬熱者生地芩連梔柏升柴挾寒者香附砂仁肉桂荊芥防風日久不愈訶子龍骨各二錢五分沒石子二個粟殼赤石脂各二錢為末米飲下一錢外用鱉頭灰敷痔漏作痛蜈蚣焙研入片腦敷之或香油煎過入五棓末調塗又田螺入片腦取水搽又孩兒茶同麝少許唾調敷痔腫燈火淬之腫消枳殼水煎熏洗旱蓮汁塗之良反花痔木瓜末鱔涎調敷桃葉杵坐密陀僧同銅青塗漏孔無名異火煅醋淬研塞水銀同棗研塞腸鳴有虛有水飲有蟲積脾虛四君子湯加薑連肺移寒於腎為湧水水者按之腹不堅水氣客於大腸疾行則鳴如囊裹水之聲葶藶澤瀉椒目桑皮杏仁豬苓各五錢為末蔥白湯送五分以利為度胃寒作瀉腸鳴升陽除濕湯加益智半夏相火激動真水二陳湯加配三黃梔子痰飲腹內雷鳴大戟主之心腹邪氣上下雷鳴幽幽如走水海藻昆布女萎並主之二十丸交腸大小便易位而出或因醉飽或因大怒臟腑垂張不循常道當吐以提其氣使闌門清利得泌別之職司服五苓散加木香枳殼即愈
