body:
  text: 卷上一中風類中中寒中氣中食中暑中熱風之為言中也肥人氣居於表中氣必虛土不生金金氣漸薄肝無所畏風木乃淫復來乘土中氣益敗乘其中虛外邪襲之則為真中西北方風高往往有之若但因中虛不犯外邪則為類中東南方柔弱往往有之內經曰風者百病之長又曰風者善行而數變故客於脈則為厲風客於臟腑之俞則為偏風風氣循風府而上則為腦風自腦戶而合於太陽則為目風飲酒見風汗出則為漏風入房汗出當風則為內風入於腸胃則為腸風外客腠理則為泄風正風邪風各不相同經云正風者從一方來即合時之正者也其中人也淺合而自去邪風者沖後來者也謂之虛邪賊風其中人也深不能自去經曰暴疾卒死皆屬於火東垣以卒然昏僕責之氣虛蓋火即氣氣即火同物而異名者也當卒僕之時以竹瀝薑汁灌蘇合香丸或三生飲加人參竹瀝薑汁灌之如抉口不開進藥且緩以細辛皂角為末吹鼻取嚏即蘇無嚏者不治痰涎壅盛者宜與吐之用牙皂四枚明礬一兩各為細末和勻輕者五分重者三字溫水調灌此名稀涎散服之不大嘔吐但微微令涎自口角流出即醒或橘紅一斤煎湯數碗多灌取吐口開心絶手撒脾絶眼合肝絶遺尿腎絶聲如鼾者肺絶此虛極而陽脫也五症不全見者速以大劑參耆朮附並急灸臍下關元氣海可救十中之一髮直吐沫搖頭上攛面赤如妝汗出如珠皆死症矣經曰虛邪客於身半其入深榮衛稍衰則真氣去邪氣獨留發為偏枯又曰身偏不用而痛言不變志不亂病在分腠之間益其不足損其有餘乃可復也即中腑症名曰痱之為病也身無痛處但四肢不收志亂不甚其言微知可治甚則不能言不可治也即中臟症外有六經形症則以小續命湯加減及疏風湯治之小續命亦麻黃桂枝之變麻桂二湯施於溫熱之症必致殺人不可執也後列太陽經無汗惡寒者麻黃防風杏仁甘草有汗惡風者桂枝防風芍藥甘草陽明經無汗身熱不惡寒者白芷石膏知母甘草有汗身熱不惡風者葛根桂枝黃芩甘草如在太陰經則無汗身涼乾薑附子麻黃防風少陰經則有汗無熱桂枝附子甘草麻黃杏仁防風若無此四經之症或在少陽厥陰柴胡防風羌活甘草連翹如上症真中者分表裡施治而在裡者則便溺阻隔宜三化湯枳實厚朴羌活大黃若表裡俱見者先與解表而後攻裡若外邪已解內邪已除而語言蹇澀半身不遂未能即愈以六君子湯加羌防歸地芍藥秦艽久久服之營衛自和即古所云大藥是也再加麻黃即一旬之微汗加大黃即一旬之微利如望春大寒之後加半夏人參柴胡木通迎而奪少陽之氣也如望夏穀雨之後加石膏知母黃芩迎而奪陽明之氣也如季夏濕土主令加防己白朮茯苓勝脾土之濕也如望秋大暑之後加厚朴藿香官桂迎而奪太陰之氣也望冬霜降之後加桂附當歸勝少陰之寒也治風之法不過解表攻裡行中道三法盡矣然風氣不齊稟賦各別七情異起六氣殊傷活法處治不可膠執也古人用牛黃丸至寶丹活命金丹品類皆辛香走竄為斬關奪門之將原為中臟之閉症設也牛黃入脾治肉麝香入腎治骨冰片入肝治筋此惟邪氣深入者乃為出矣若施之於中腑氣虛脫絶之症反掌殺人如人既入井而又下石安得不立斃乎類中之症其卒倒偏枯語言蹇澀痰涎壅盛皆與真中風相類故曰類中但無六經形症為異耳此惟中氣虛憊故虛風內煽所致東垣主虛誠為合論河間主火丹溪主痰其言各殊而不知其虛也故無根之火發焉惟其虛也故逆上之痰生焉東垣舉其本河間丹溪道其標似異而實同也心火涼膈散肝火小柴胡湯水虛火炎六味地黃湯類中之卒倒偏枯症類雖有多種總由真氣不周充血液因而逆泣也參耆君之歸地佐之更以秦艽茯神竹瀝人乳薑汁梨汁最為穩當凡治中風須分陰陽陰中者其色青或黑或白痰喘昏迷眩冒多汗甚則手足厥冷陽中者面赤唇焦牙關緊急上視強直掉眩煩渴凡人大指次指麻木不仁三年之內必患中風須預防之宜慎起居節飲食遠房幃調性情更以十全大補湯加羌活久久服之經歲不輟則潛移默奪弭災卻疾矣若用古法天麻丸愈風丹開其玄府漏其真液適足以招風取中耳預防云乎哉口噤不開足陽明頷頰之脈偏急則口噤不能開肝風乘胃故也皂角乳香黃耆防風煎湯熏之須大作湯液如蒸如霧乃得力耳再以南星冰片為細末擦其牙根或藜蘆鬱金為末搐鼻或明礬一兩飛鹽五錢研勻擦牙又可將錢許棉裹安牙盡處又法甘草五寸截作五段麻油浸透火炙抉口令人咬之約人行十里許又換一截從此灌藥為便口眼喎斜耳鼻常靜故風息焉口鼻常動故風生焉風搖則血液衰耗無以榮筋故筋脈拘急口目為僻眥急不能卒視人參黃耆當歸白芍升麻秦艽葛根防風鉤藤紅花蘇木水煎和酒服外用桂枝三兩酒煎濃汁以故布浸之乘熱左歪搨右右歪搨左再以乳香二兩皂角一兩銼拌勻燒煙燻之語言蹇澀經曰足太陰之脈連舌本散舌下病則舌本強又足少陰之直者挾舌本又曰內奪而厥則為喑俳又腎脈之氣不上循喉嚨挾舌本則不能言用地黃飲子地黃巴戟蓯蓉茱萸肉桂枝附子薄荷麥冬五味茯苓菖蒲遠志石斛脾土不足痰涎壅盛言蹇澀者六君子湯加南星木香乾葛枳實遠志竹茹挾熱者山梔連芩花粉薄荷四肢不舉耳其其脈緩大有力者土太過也平胃五苓散主之其脈細小無力者土不及也補中益氣湯主之隨症加減身體疼痛挾濕熱者當歸拈痛湯羌防升葛知茯草豬澤茵陳及苦參人參二朮當歸並湯名拈痛有奇勳挾寒者鐵彈丸乳沒各一兩烏頭泡去皮靈脂酒淘淨加麝薄荷宜挾虛者十全大補湯加秦艽身重氣虛也補中八味治之周身盡痛者蠲痹湯歸芍薑黃與羌活甘草黃耆薑棗煎身重之症時師止知燥濕而不知補虛按素問示從容論篇歷言肝虛腎虛脾虛皆令人體重煩冤是以身重乃虛症也不止於濕可盡耳痰涎壅盛星香二陳為主蓋治痰以順氣為先挾虛者加參耆竹瀝挾寒者桂附薑汁養正丹鎮安元氣下墜痰涎實者星香湯送下虛者六君子湯送下遺尿不禁脾虛下陷者補中益氣湯加益智腎虛不能收攝者地黃飲子合參麥散善飢多食風木太過凌虛中州脾土受攻求助於食法當瀉肝安脾則復其常矣青皮芍藥柴胡山梔人參白朮甘草茯苓更當隨時審症而為之變通也神氣昏冒痰涎逆衝於上心主被障故昏不知人此係中臟而非中腑閉症而非脫症宜牛黃丸清心肺等治之人參麥冬茯神膽星山藥白朮甘草羚羊角犀角雄黃硃砂牛黃冰麝金箔大棗打膏加蜜為丸或至聖保命丹管仲一兩生地七錢大黃五錢青黛板藍根各三錢硃砂雄黃川鬱金薄荷各一錢五分珍珠冰片各一錢五分麝一錢煉蜜丸金箔為衣煎方宜六君子湯加南星木香菖蒲遠志肉竹瀝薑汁服之又有厥逆昏迷因醉飽過度而得名曰食中莫作中風中氣治之外治急救涎潮方凡男婦卒然中倒涎潮於心不省人事當時即扶入室中令其正坐用好醋斤許焠入炭火中熏之令其氣入口鼻其涎自歸經其人漸醒切不可用薑湯及滴水入口如水一入逆其痰涎永繫於心成痼疾矣史國公酒方治左癱右瘓四肢頑麻骨節痠痛一切寒濕風氣及腎虛足膝無力並宜服之當歸羌活虎脛骨防風鱉甲秦艽萆薢牛膝杜仲蠶砂各二兩枸杞一面白茄根八兩無灰酒一斗絹袋盛藥入酒浸十日重湯煮三香又窨五日服之無間頗收效驗中寒之症相似中風比之傷寒更為深重身體強直或口噤戰栗甚則厥逆無知先以薑汁好酒或加冰麝灌之如輕用麻黃蒼朮枳朴薑桂或薑汁湯重則薑汁湯並以艾灸丹田穴腹中痛加木香筋急加木瓜凡中寒之人先宜與溫水若遽與熱水及近火即死中氣七情所傷氣逆痰潮卒然昏僕與中風相類但中風身溫多痰涎脈浮應人迎中氣身冷無痰涎脈沉應氣口以氣藥治風則可風藥治氣則不可急以蘇合香丸灌之候蘇用八味順氣散白朮茯苓人參甘草青皮陳皮烏藥白芷加香附薑棗或木香調氣散有痰者星香散如其人本虛痰氣上逆關格不通宜養正丹水銀硃砂鉛硫四味等分用鐵器熔鉛入水銀以柳木杵和勻次下硃砂再和勻不見星入硫急研成汁有焰用醋灑之候冷細研糯米糊丸如緑豆大若作中風治之誤矣經曰無故而喑脈不至者不治自已謂氣暴逆也氣復自愈當與厥症互看如因風寒者藿香正氣散白芷茯苓紫蘇腹皮藿香厚朴白朮半夏陳皮桔梗甘草薑棗煎服中暑因在暑月其症卒暴面垢冷汗出手足微冷昏暈或吐或瀉或喘或滿以來復丹治之硝石同硫一面為末入磁器內微火熔柳條攪用火不可太旺恐傷藥力再研極細名曰二氣丹加太陰玄精石水飛五靈脂水飛青皮橘紅各二兩先用青皮橘紅靈脂為末次入玄精及二氣末好醋打糊為丸如豌豆大每服三十丸或蘇合丸用白朮犀角木香香附檀香沉香硃砂水飛訶子煨去皮麝香丁香蓽茇安息用酒熬膏龍腦熏陸香另研蘇合油各一兩上除安息膏蘇合油煉蜜和劑其餘共為末丸如茨子大以蠟固匱用時取出湯調灌之即蘇稍蘇再以香薷扁豆厚朴陳皮煎服此症外陽而內陰故用辛溫取其通竅也中熱僵仆勿與涼水及涼物如寒氣一逼即死須安置於近日暖處取路上熱土放其臍上作窩令人溺尿於中或用大蒜研爛同熱土為湯去渣灌之或將日曬熱瓦尉其心腹及臍下勞役動作之人多得之中暑靜而逸者得之陰症也頭疼惡寒拘急肢節痛煩心無汗無大熱宜大順散乾薑甘草杏仁厚朴香薷動而得之為中熱陽症也身熱煩燥惡熱大渴多汗無氣以動宜蒼朮白虎湯蒼朮石膏知母甘草粳米虛人以補中益氣湯為主虛人有房勞者禁香薷中暑忽然不省人事宜灸百會中脘三里脾俞合谷人中陰谷三陰交斟酌用或針亦可冒暑大熱霍亂吐瀉百勞委中合谷曲池三里十宣等穴酌選針灸左右癱瘓痹厥偏枯半身不遂筋攣痰涎針用肩髃合谷曲池環跳風市足三里絶骨崑崙陽陵泉中風痰涎壅盛聲如牽鋸服藥不下者宜灸關元丹田二穴多灸之為妙忽然中風不知人事宜以十宣穴出血即醒乃十指頭端並穴二虛勞咳嗽吐血傳尸瘵症黃帝曰陽虛則外寒不知其所由然也岐伯曰陽受氣於上焦以溫皮膚分肉之間今寒氣在外則上焦不通上焦不通則寒氣獨留於外故寒栗帝曰陰虛生內熱奈何岐伯曰有所勞倦形氣衰少穀氣不盛上焦不行下脘不通胃氣熱熱氣熏胸中故內熱帝曰陽盛生外熱奈何岐伯曰上焦不通利則皮膚緻密腠理閉塞玄府不通衛氣不得泄越故外熱帝曰陰盛生內寒奈何岐伯曰厥氣上逆寒氣積於胸中而不瀉不瀉則溫氣去寒獨留則血凝泣凝則脈不通其脈盛大以澀故中寒夫人之生也陰血為營陽氣為衛二者運行而無壅滯病安從生若力用不休則龍雷二火逆僭至高故勞字從火曲運神機則心勞而為虛汗怔忡縱情房室則腎勞而為骨蒸遺泄恣睢善怒則肝勞而為痛痹拘攣形冷悲哀則肺勞而為上氣喘嗽動作傷形思慮傷意則脾勞而為少食多痰形羸神倦故勞者必至於虛虛者必因於勞古稱五勞七傷六極二十三蒸症狀繁多令人眩惑但能明先天后天根本之治無不痊安蓋簡而不煩約而無漏者也夫人之虛非氣即血五臟六腑莫能外焉然血之源頭在乎腎蓋水為天一之元而人資之以為始者也故曰先天氣之源頭在乎脾蓋土為萬物之母而人資之以為生者故曰後天二臟安和則百脈受調二臟虛傷則千疴競起至哉斯言可為後學司命之指南也土為金母而金為主氣之官故肺氣受傷者必先求助於脾家水為木母而木為藏血之地故肝血受傷者必由藉資於腎府虛勞之症扶脾保肺兩不可缺然脾之性喜溫喜燥而溫燥之劑不利於保肺肺之為性喜涼喜潤而涼潤之劑不利於扶脾兩者並列而論脾有生肺之能肺無扶脾之力故曰土壯而生金勿拘拘於保肺瀉火之亢以全陰氣壯水之主以鎮陽光法當並行然瀉火之品多寒而損陽氣壯水之劑多平而養陰血兩者並列而論苦寒過投將有敗胃之憂甘平恆用卻無傷中之患故曰水盛而火自熄勿亟亟於寒涼症如煩渴喘呼脈見數大有力當潤肺為主而扶脾佐之症如食少善泄脈見細數無力當扶脾為主而保肺佐之甚則保肺之劑不利於脾當盡去之卻宜補土之母庶可冀其回春全在明辨其症之何如變通以治之可也春夏之令主生長秋冬之令主肅殺人皆知之殊不知藥之溫者行天地發育之德藥之寒者象天地肅殺之刑如四物加知柏舉世奉為滋陰上品降火神丹不知秋冬之氣非所以住萬物者也涼血之藥常膩滯非痰多食少者所宜涼血之藥常滋潤必至滑滯腸鳴況知柏苦寒苦先入心久而增氣反能助火至於滑泄敗胃所不待言丹溪云實火可瀉虛火可補試問勞症之火屬之虛乎屬之實乎瀉之可乎昔有云畏知柏如鳩毒恐伐吾命根耳如病初起而相火正隆或燥渴而右尺滑大亦暫投之卻無妨也若久用之則斷乎不可或問血主濡潤四物湯豈非濡潤而為血虛者之要藥乎答曰血虛而燥用四物以濡之未嘗非合劑也但恐用之久而多則在上有泥膈奪食之憂則在下有滑腸泄瀉之患且主秋冬之令鮮發育之功也或問氣有餘便是火補氣之藥能無助火乎古云正氣與邪氣原不兩立猶低昂然一勝則一負正氣旺則邪氣無所容如滿座皆君子一小人自無容身之地或問人參補氣至王好古言其肺熱傷肺至節齊謂虛勞症服參者必死天下皆稱人參有毒視參如蠍其說是否答曰肺家本經有火右寸大而有力東垣謂熱鬱在肺者勿用若肺虛而虛火乘之肺已被傷苟非人參何以救之乎故好古之說猶為近理節齊之言膠柱鼓瑟千古之罪人也至謂人參有毒庸俗多有是言不知誰為作俑真堪噴飯或問血虛自應補血專以氣藥為主得無左乎答曰血虛應投血藥乃為正法但專用多用中州有礙至於以氣藥為主似乎相左不知素問無陽則陰無以生仲景曰身熱亡血身涼脈凝血虛並加人參蓋血脫者須益氣為血不自生須得陽和之藥乃生陽生而陰長也若只用血藥則血無由而生矣東垣云人參甘溫補脾脾氣旺則四臟之氣皆旺精自生而形自盛也白飛霞雲人參多服回元氣於無何有之鄉凡病後氣虛及肺虛喘嗽者並宜用之若氣虛有火宜與麥冬同服楊起云人參功載本草人所共知古方治肺寒以溫肺湯肺熱以清肺湯中滿分消湯血虛養營湯皆用人參庸醫每謂人參不可輕用誠哉庸也自本經以至諸家諄諄言之以氣藥有生血之功血藥無益氣之理可謂詳切著明奈何人不悟耶人有先後二天補腎補脾法當並行然以甘寒補腎恐妨脾氣以辛溫快脾恐妨腎水須衡其緩急而為之施治或滋腎而佐以沉香砂仁快脾雜以山藥五味機用不可不活也脾具坤順之德而有乾健之運故遊溢精氣上輸於肺通調水道下輸膀胱水精四布五經並行則水源從此沃矣且脾不下陷則精氣固而二便調俾少陰奉之得以全閉蟄封藏之本故脾安則腎愈安矣此許學士所以補腎不如補脾之說也腎兼水火水不挾肝上浮而陵卑監火能益土善運而奉精微故腎安而脾愈安矣此孫思邈所以有補脾不若補腎之說也此兩說者皆有見於根本重地亟有提防特為虛家設一大炬也五臟之熱各自不同肺熱者輕手即得略重全無肺主皮毛也日西尤甚其症喘咳灑淅善嚏善悲缺盆痛胸中痛肩背痛臂痛臍右脹痛小便頻數皮膚痛及麻木實則夢兵戈虛則夢田野實則瀉之桑皮葶藶枳殼蘇子防風之屬虛則補之人參黃耆麥冬五味茯苓山藥百合紫苑之屬形寒飲冷則傷肺溫之以乾薑款花木香豆蔻之屬涼之以沙參元參知母貝母黃芩山梔花粉兜鈴之屬心熱者微按之皮毛之下肌肉之上乃得加力按之則全不熱心主血脈也日中尤盛其症煩心心痛掌中熱而噦善忘善笑善驚不寐築築然動舌破消渴口苦心胸間汗實則夢驚憂怖恐虛則夢煙火焰火虛則補之以丹參圓眼茯神麥冬當歸山藥實則瀉之以黃連憂愁思慮則傷心溫之以桂心益智菖蒲柏子仁涼之以犀角牛黃竹葉硃砂連翹脾熱者輕手固不熱重按亦不熱熱在不輕不重之間脾土主肌肉也遇夜尤甚其症怠惰嗜臥四肢不收無氣以動泄瀉便祕面黃舌強痛口甘吐逆不嗜食不化食搶心善寐善飢善噫當臍痛腹脹腸鳴肉痛足腫實則夢歡歌快樂虛則夢飲食相爭飲食勞倦思慮則傷脾虛則以人參黃耆白朮茯苓甘草山藥扁豆苡米陳皮補之實則以蒼朮厚朴枳實山楂青皮檳榔大黃芒硝瀉之薑附丁桂溫之元明粉石膏滑石黃芩涼之肝熱者按之肌肉之下筋骨之上乃得肝主筋也寅卯時尤甚其症多怒多驚便難轉筋攣急四肢困熱滿悶筋痿不能起頭痛耳聾頰腫面青目痛兩脅痛小腹痛嘔逆作酸睪疝冒眩善瘛實則夢山林大樹虛則夢細草苔蘚阿膠山藥棗仁木瓜補之青皮芍藥柴胡龍膽青黛黃連木通瀉之怒則傷肝木香肉桂吳茱萸溫之甘菊車前山梔柴胡黃芩涼之腎熱者輕手捫之不熱重按至骨乃熱亥子時尤甚腎主骨也其症腰膝脊俱痛耳鳴遺泄二便不調骨痿不能起眇中清目昏面黑口乾咯血飢不欲食腹大脛腫臀股後痛小腹氣逆下腫腸澼陰下濕癢手指青黑厥逆足下熱嗜臥坐而欲起善怒四肢不收實則腰脊解軟虛則夢泄及渡水恐懼地黃枸杞桑螵蛸龜版山藥山萸牛膝杜仲五味子補之澤瀉知母瀉之肉桂附子補骨脂肉蓯蓉鹿膠沉香溫之知母黃柏丹皮骨皮涼之強力坐濕則傷腎腎傷須重補之骨碎補補骨脂虎脛骨何首烏地黃之屬經曰二陽之病發心脾有不得隱曲女子不月其傳為風消其傳為息賁者死不治三陽為病發寒熱下為癰腫及為痿厥腨㾓其傳為索睪其傳為頽疝一陽發病少氣善咳善泄其傳為膈二陽謂足陽明胃手陽明大腸也二陽之病發心脾心在上焦病則不利故不得隱脾在中焦病則脹滿故不得曲然心為生血之元脾為運化之府若在女子必不月奚不月經水不下也傳曰九傳變也言土病日久則木必乘虛而克賊之脾土日虧而肌肉日見消削故名風消心病日久則傳於肺金受火邪則息氣不利而奔迫故名息賁脾土虛而受木克心火盛而克肺金皆不治之症矣三陽謂手太陽小腸足太陽膀胱也為病不發於他臟自為寒熱也小腸為丙火膀胱為壬水故耳水病則凝結火病則糜爛故下為癰腫也無力為痿逆冷為厥腨足腹也㾓痠疼也其傳為索睪睪腎丸也索引丸而痛也頽疝者頑大而不疼也一陽謂手少陽三焦足少陽膽也二經病發皆是火火盛則少氣金虛則咳作也膈塞也上焦不行下脘不通鬲塞於中故名膈也經曰春夏則陽氣多而陰氣少秋冬則陰氣盛而陽氣衰以秋冬奪於所用下氣上爭不能復精氣溢下邪氣因從之而上也下氣身半以下之氣上爭者陽搏陰激也身半以下之氣亦引而上爭不能食謂不能復歸其經也溢下者陰精之氣湧溢泄出而上因中部氣衰從之而上乘其虛故奪也氣因於中陽氣衰不能滲其經絡陽氣日損陰氣獨在故手足為之寒也四肢諸陽之本衰則俱衰故合手足為寒厥也岐伯曰酒入於胃則絡滿而經脈虛脾主為胃行其津液者也陰氣虛則陽氣入陽氣入則胃不和胃不和則精氣竭精氣竭則不營其四肢也陰五臟之陰陽四肢之陽陰氣竭五臟之陰竭也此人必數醉若飽以入房氣聚於脾中不得散酒氣與穀氣相搏熱盛於中故熱遍於身內而溺赤也夫酒氣盛而慓悍腎氣有衰陽氣獨勝故手足為之熱慓悍強暴也腎氣陰氣也岐伯曰皮毛者肺之合也皮毛先受邪氣邪氣以從其合也邪寒邪也其寒飲食入胃由肺脈上至於肺則肺寒肺寒則外內合邪因而客之則為肺咳所云形寒飲冷則傷肺也五臟各以其時受病非其時各傳以與之如春肝用事則肝先受邪若是寒邪則傳以與肺肺咳之狀咳而喘息有音甚則唾血心咳之狀咳則心痛喉中介介如梗狀甚則咽腫喉痹肝咳之狀咳則兩脅下痛甚則不可以轉轉則兩胠下滿脾咳之狀咳則右脅下痛陰陰引肩背甚則不可以動動則咳劇腎咳之狀咳則腰背相引而痛甚則咳涎五臟之久咳乃移於六腑脾咳不已則胃受之胃咳之狀咳而嘔嘔甚則長蟲出肝咳不已則膽受之膽咳之狀咳嘔膽汁肺咳不已則大腸受之大腸咳狀咳而遺矢心咳不已則小腸受之小腸咳狀咳而失氣氣與咳俱失腎咳不已則膀胱受之膀胱咳狀咳而遺溺久咳不已則三焦受之三焦咳狀咳而腹滿不欲食飲此皆聚於胃關於肺使人多涕唾而面浮腫氣逆也三焦者人身上中下元氣之所在其氣即火故名三焦久咳不巳則傷其元氣而邪受之故咳而腹滿不欲食所以然者三焦火衰不能生胃土也土虛則三焦虛邪皆入於胃而萬物歸土之義關於肺者言關係於肺也土虛而不能制水故多涕吐肺衰則不能施降下之令故面目浮腫而氣逆也張仲景曰五勞虛極羸瘦腹滿不能飲食食傷憂傷飲傷房室傷飢傷勞傷經絡營衛氣傷內有乾血肌膚甲錯兩目黯黑緩中補虛大黃䗪蟲丸主之大黃䗪蟲桃仁乾漆虻蟲水蛭蠐螬以破瘀地黃芍藥以潤其乾燥甘草緩中黃芩杏仁利肺蓋肺主行營衛陰陽者也肺氣利則乾血去而營衛行營衛行則肌肉充而虛勞補矣按虛勞發熱未有不由七情之內傷者人之起居飲食之間一失其節即有所傷何況拂逆心志鬱結暴怒豈無血畜耶故以滋潤之品治乾枯以啖血之物行死血死血既去病後可從事於滋補仲景為醫方之祖不可不繹其言也活法機要云虛損之疾有寒有熱皆因虛而感也感寒則損陽陽虛則陰盛故損自上而下一損損於肺故皮聚而毛落二損損於心故血脈虛衰不能營養臟腑女人則月水不行三損損於胃故飲食不為肌膚治之宜以辛甘淡感熱則損陰陰虛則陽盛故損自下而上一損損於腎故骨痿不能起於床二損損於肝故筋緩不能自收持三損損於脾故飲食不能消化也按心肺損則色弊肝腎損則形痿脾胃損則穀不化也如肺損而皮聚毛落者宜益其氣四君子湯心肺俱損皮聚毛落而血脈虛耗宜益氣和血八珍湯心肺胃俱損飲食不為肌膚十全大補湯腎損骨痿者宜益精金匱丸肝損筋緩宜緩中牛膝丸肝腎脾俱損益精緩中消穀溫腎丸陽盛陰虛肝腎不足宜八味丸瘦弱困倦未辨陰陽夏月宜六味丸春秋宜加減八味丸冬月八味丸肺熱鼻乾紫菀二冬烏梅等皮膚熱舌白吐血桑皮石膏肌膚熱昏寐嗜臥丹皮骨皮氣熱喘促鼻乾人參黃芩桅子大腸熱右鼻孔干痛芒硝大黃等脈熱吐血經絡脈溢緩急不調生地當歸心熱舌乾生地黃連血熱發焦地黃當歸桂心童便小腸熱下唇焦木通赤茯生地脾熱上下唇俱焦芍藥木瓜苦參胃熱食無味而嘔煩躁不安芍藥口熱舌下痛石膏竹葉大黃芒硝葛根粳米肝熱眼黑川芎生地前胡筋熱甲焦生地黃川芎膽熱眼白失色柴胡栝蔞三焦熱乍寒乍熱煨石膏竹葉腎熱兩耳焦石膏知母生地元參腦熱頭眩悶暈羌活防風荊芥地黃薄荷甘菊髓熱骨髓中沸熱二冬鱉甲生地骨皮元參知母當歸骨熱齒黑腰痛足冷疳蟲蝕臟骨皮鱉甲生地當歸肉熱肢細趺腫臟腑俱熱石膏黃柏胞熱小便黃赤生地滑石木通茯苓燈草膀胱熱左耳焦澤瀉茯苓滑石玄珠云一水既虧不勝五火虛症蜂起當先和解微下次則調補若邪氣未除便行補劑邪入經絡良可嘆也惟無邪無積之人按脈無力者方可補之陳藏器諸虛用藥例虛勞頭痛身熱枸杞萎蕤虛而欲吐人參萎蕤虛而不寧人參茯神虛而多夢龍骨人參圓眼虛而多熱地黃甘草牡蠣地膚子虛而冷川芎當歸乾薑虛而損巴戟蓯蓉鍾乳虛而大熱天冬黃芩虛而多忘遠志茯神虛而口乾麥冬知母虛而吸吸柏子仁胡麻覆盆子虛而驚怖龍齒沙參小草若兼冷紫石英小草虛而多氣兼微咳五味大棗虛而客熱沙參龍齒天冬虛而腰間不利杜仲狗脊磁石虛而多冷桂附虛而小便赤黃芩虛而有痰復有氣半夏陳皮虛而便失龍骨桑螵蛸虛而溺白厚朴虛而小便不利人參茯苓澤瀉髓竭地黃阿膠當歸枸杞肺虛二門冬五味心虛人參茯神菖蒲圓眼丹參棗仁當歸肝虛川芎天麻當歸脾虛白朮白芍山藥益智腎虛熟地丹皮遠志膽虛細辛地榆棗仁神昏硃砂茯神五臟雖皆有勞心腎為多心主血腎主精精竭血枯則勞成矣惟宜滋養培補調心益腎雄附之性峻烈內乏精血何堪當此雖云壯火適足以發其虛陽然又不可因其熱而純用寒涼以傷胃氣若過用熱藥者猶釜中無水而進火也過用寒涼者猶釜下無火而添水也非徒無益而反害之宜十全大補湯養榮湯建中湯皆可選用如左尺獨虛者六味丸壯水之主以制陽光右尺不足者八味丸益火之元以消陰翳丹溪之論勞瘵主乎陰虛未嘗非也陰虛之熱以其在午後子前諺云朝涼暮熱也陰虛則汗從寐時盜出也陰虛無以制火則火氣逆上喘嗽而吐痰也陰虛則脈浮大或沉虛也四物湯加黃柏知母主之以四物補血血為陰又以知柏降火理固然也不知後人以此概施多致夭枉不察變通而纍丹溪也蓋川芎上竄非火炎者所宜地黃膩滯非痰多食少者所宜知母易於滑腸黃柏易於敗胃暫投猶可久用必傷豫今制一主方以苡米茯苓扶胃且切降下之功以桔根陳皮行氣且有健脾之力麥冬五味保肺而有滋化之原骨皮丹皮除蒸而無寒涼之害痰喘以桑皮川貝止血以童便藕汁泄瀉以山藥蓮肉燥結以人乳犁汁此以甘涼之品行降收之令為初病者設也若久病而百脈空虛虛火亢炎非甘溫之品不能復其真元宜異功散是也非濡潤之物不能滋其枯朽地黃丸是也若少氣懶言目昏面白宜生脈散及甘桔湯頻頻啜之若病久而結痰成積腹脅常熱惟頭面手足於寅卯時乍涼宜六君子湯加薑汁竹瀝送滾痰丸三錢先以湯潤丸令其易化可分三次服不得頓而過多有面色不衰肌膚不瘦外若無病內實虛傷俗名桃花疰須察其現在何症何臟受傷而後治之勞症久嗽咽痛失音此乃下傳上也不嗽不痛溺濁脫精此乃上傳下也皆非吉兆形色尪羸陽事不禁脈細無根脈數無倫死在旦夕矣吐血分五臟悲憂所致咳嗽吐血者出於肺二冬二母甘桔主之思慮所致痰涎帶血者出於脾石斛生地黃丹皮甘草陳皮茯苓黃耆葛根主之因驚所致而吐血者出於心丹參生地麥冬當歸山藥茯神主之因怒所致而吐血者出於肝柴胡芍藥山梔生地丹皮當歸沉香棗仁主之因房勞而咯血者出於腎生地丹皮黃柏知母阿膠遠志茯苓主之因中氣失調邪熱在中而嘔血者出於胃犀角地黃丹皮甘草元明粉主之陽經之血色鮮紅陰經之血色豬肝血本屬陰靜而定者其常也其行則潛如水流而在下者亦常也上行外出其變也七情妄動形體疲勞陽火相迫以致妄行脈洪口渴便結者宜行涼藥若使氣虛挾寒陰陽不相為守血亦妄行必有虛冷之狀蓋陽虛則陰亦走也宜理中湯加木香烏藥若飲食傷胃上逆吐衄宜理中湯加香附砂仁山楂神麯調之內經論凡寒暑燥火六氣之變皆能失血各當求責若不察其所因例以寒折變乃生矣吐血之初多宜大黃下之夫血以下行為順上行為逆蓋因曲而為直也然又曰亡血虛家切禁下之何也宜下者下於畜妄之初禁下者禁於亡失之後不可不明辨也積勞吐血及久病之餘吐而多且不止者並以獨參湯主之血脫補氣之法也如血從九竅齊出亦脫也以發灰生薊汁人參湯調服止之或血溢及觸破被傷遂如泉湧惟用十全大補湯頻頻多服血症既久古人多以胃藥收功加烏藥沉香大棗此虛家神劑也氣有餘便是火血隨氣上補水則火自降順氣則血不升生地牛膝丹皮補水之藥也橘紅蘇子沉香順氣之藥也童便者濁陰歸下竅兼有行血之能藕汁者達血使無滯更有止澀之力脈來沉實腹痛中滿必有瘀畜紅花桃仁赤芍玄胡當歸蓬朮降香之屬怒傷肝木則血菀於上令人薄厥沉香木香丹皮青皮芍藥之屬勞傷心神以麥冬棗仁柏仁蓮心茯神遠志丹參竹葉之後飲酒所傷以葛根白蔻砂仁側柏葉茅花之屬房勞所傷以地黃牛膝枸杞杜仲人參之屬血中有火生地丹皮芩連之屬止血分治熱者涼之以山梔灰黃連灰血灰瘀者行之以大黃灰靈脂灰漆灰血灰寒者溫之乾薑灰血灰滑者澀之棕櫚灰荷葉灰虛者補之地黃灰當歸灰發灰之類藥性不同三七鬱金行血中之氣花蕊石能化瘀為水側柏葉涼血中之熱大小薊行血中之滯茅根導之下行百草霜取其黑色以制其紅而止之也傳尸勞者鬼作蟲而為祟者也凡人之元氣虛衰或因弔喪問疾登冢入廟邪祟乘虛憑依為患漸至生蟲蟲在身中食人腑臟五日一退方其猖獗神氣昏悶無處不疼其退則還穴睡五日如蠶之眠也病則乍靜治之候其退睡時可也一月之中上旬十日蟲頭向上中旬十日蟲頭向內下旬十日蟲頭向下須在上旬治之易為力也中下二旬治之無功先食人脂膏故蟲色白皮聚毛落肺受侵傷七十日後食人血肉蟲色黃赤肌肉損壞枯索尪羸百二十日後血肉食盡蟲色紫黑食人精髓腎敗骨痿諸蟲日久遍身生毛毛色五采傳之三人即自能飛狀如禽獸品類甚多出入自如隱現莫測大抵至食精髓雖有良法亦不能治經云六十日治十得七八八十日治十得三四過此以往焉保生全惟當搜逐為後日人除害耳傳尸之症沉沉默默無一而可經年纍月漸就羸困至於死亡又傳旁人乃至滅門又傳他姓慘毒之禍聞者駭心辨驗之法須用乳香焚熏病者之手令其仰掌以帛覆之熏之良久手背生毛長至寸許白而黃者可治紅者則難青黑者死若熏之良久無毛者非傳尸也乃是尋常虛勞之症又法用燒安息令煙出與病人吸之嗽不止者乃傳尸也不嗽者非傳尸也嗽不甚者亦非也驅蟲方室女頂門活發洗去油垢一兩紙燃燒存性川芎五錢當歸五錢木香桃仁各三錢安息香雄黃各一錢全蠍二枚大黑魚頭一枚醋炙上為末分作四服每服以井水一大碗於淨室中煎至七分入降香末五分燒北斗符入藥月初五更空腹向北仰天咒曰瘵神瘵神害我生人吾奉帝敕服藥保身急急如律令咒五遍面北服藥畢東面吸生氣入口腹中燒降香置床下午時又如前服藥念咒生氣即太陽真氣也用黃紙一方將新筆一支淨水研硃砂書此符書時亦須念前咒俟干將火焚於湯藥中面北念咒服之服畢向東吸太陽氣入口腹上依法服之厚蓋取汗汗中有細蟲以軟絹拭之即用火焚其絹如大便用淨桶盛之急鉗取蟲烈火煅過取灰收入罐內以雄黃末蓋上再用瓦油盞合口鐵線扎定泥固封好埋於遠僻絶人行處深三尺為度瘵蟲為患最易傳染人能謹戒七情嚴避六氣常遠房室節飲酒食蟲不可得而染也若縱欲恣情精血內耗邪祟外入凡覺元氣稍虛或飢餒時勿近瘵疾之家及衣服器皿而皆能染觸之或有婦病思男男病思女一見其面隨即染傷不可不知也治瘵之法固本為先驅蟲為次安息阿魏蘇合沉香冰麝犀角硃砂雄黃皆有法邪伐惡之能更須以天靈蓋助之蓋尸氣淹纏得枯骨導之使鬼氣飛越於是乎瘥外則以虎牙貍骨水獺穿山甲全蠍蜈蚣皆猛厲之品可以奪尸蟲之魄要之先以芎歸血餘散之於根本之地為要驅蟲灸法用鬼眼穴令病人舉手向上略轉後些則腰間有兩陷可見即鬼眼也以筆點記於六月癸亥日亥時灸此穴七壯勿令人及病人先知乃靈其外肺俞二穴同膏肓二穴亦能祛蟲虛勞吐血及咳逆上氣灸上脘肺俞如年壯鼻血不止急於項後髮際兩筋間宛宛中灸三壯立止蓋血由此而上入腦注鼻也灸之則截其路即啞門穴也咳嗽針肺俞列缺天淵痰多屬濕者取豐隆穴氣逆作喘取三里降氣灸丹田七壯夫人但知血熱妄行不知血寒亦吐乃陰乘於陽名心肺二經嘔吐者灸用三陰交心俞鬲俞少商神門冷嗽補合谷瀉三陰交寒嗽不愈灸取膏肓肺俞天突三里肺癰吐血膿灸取膻中肺俞支溝大陵咳嗽紅痰列缺百勞肺俞中脘足三里針灸皆可三痰喘痰火上壅喘嗽發熱足反熱者服消痰降火藥必死宜量其輕重用人參一兩少則三五錢佐以桂附煎湯候冷飲之立愈韓懋所謂假對假真對真也然此實由腎中真水不足火不受制而炎上歸附火類也下咽之初借其冷意暫解鬱熱及至下焦熱性始發從其窟宅而招之同氣相求火必下降自然之理也苟非人參君之則不能奏功或問寒因熱用熱因寒用何謂也寒熱和而平氣寒熱離而為病氣因用者則是寒熱過脈處也喘主肺郁痰與氣搏肺竅壅塞或脾胃氣虛金失所養故呼吸不相續而為喘也又寒主遲緩熱主急數寒則息遲氣凝熱則息數氣急故喘丹溪曰喘急者氣有火鬱而有積痰於脾胃也程玠曰痰嗽者嗽便有痰出勞嗽者盜汗面赤火嗽者乍進乍退寒嗽者鼻塞聲重治渴必須益血蓋血即津液所化津液既少其血必虛故須益血凡吐血之後多必發渴病生於血虛也針法見前四噎膈反胃噎膈反胃多因於內傷憂鬱失志及恣意酒食縱情勞欲以致陽氣內結陰血內枯而成也經曰三陽結謂之膈三陽者手太陽小腸手陽明大腸足太陽膀胱也蓋小腸熱結則小水短少而火氣不泄大腸熱結則大便不利而鬱熱難除膀胱熱結則津液不行而道路蹇澀三陽並結則前後之氣不行下既不行邪火上逆火上逆則煎液生痰痰液生則往來之氣愈阻而嘔逆噎膈之症起矣且也重傷之以七情更感之以六氣或不戒炙煿肥厚之物或妄投辛香燥熱之劑遂致邪火愈熾津液愈結病情愈深豈易療哉須分上中下三焦以治之夫咽嗌梗塞氣不順利水飲可行食物難入其槁在吸門名之曰膈其或食下則胃脘痛作煩悶不安須臾吐出食出而安其槁在賁門名之曰噎二者屬上焦其或食雖可下良久復出其槁在於幽門名曰反胃此屬中焦其或朝食暮吐暮食朝吐所出完谷小便赤大便硬或如羊矢其槁在闌門亦名翻胃此屬下焦然壯者猶或可治當用透膈疏氣化痰清火健胃和脾之劑經又曰噎膈多生於血乾反胃亦生於脾弱東垣曰脾陰也血亦陰也陰主靜內外兩靜則腑臟之火何陰而生金水二臟有養陰血自生腸胃津液傳化合宜何噎膈之有哉夫張雞峰之論噎膈也其言曰此症是神思間病治須內觀靜養乃始得旨蓋百病之因多兼六淫而成噎膈則惟以七情所致由於飲食者亦間有之治之之法非無開胃止吐養陰潤燥之方然病在神思所謂心病還須心藥也內養者外之對此症向來事外忘內未嘗收攝此心或為利鎖名韁或為酒沉色困以致五臟空虛氣無所主食不能入入亦反出若不垂簾返照及忙裡偷閒濃中著淡何以屏絶諸魔然以眼觀內則眼雖閉而神或外馳以心觀內則心有定而眼可不閉夫是之謂內觀靜者動之對此症素因多動少靜不能恬逸此心非見誘於大喜大怒而致傷神傷肝間被牽於勞思過恐而遂傷脾傷腎以致五火叢起血無由生胃脘乾枯大腸結燥今當一切排遣物過不留務期安養休息故強制其形即地僻山深只稱跡隱寧靜其志雖車轟馬驟亦自心清夫是之謂靜養能此二者則膈自通而食飲進逆自順而嘔吐止燥者自潤而陰血生結者自開而二便利其亦賢於蛇腹鼠杵頭糠之類遠矣噎者飲食入咽阻滯不通梗塞難下皆咽喉閉塞之貌由於悲思過度憂怒不節則氣機凝阻清濁相干違其運行之常乃成噎塞張雞峰所云噎是神思間病當靜觀內養以寧其心志心君泰然則五火退聽營衛安和矣噎則必兼塞症故東垣云堵塞咽喉陽氣不得上出者名曰塞五臟之所生陰也血也陰氣不得下降者曰噎六腑之所生陽也氣也夫噎塞於胸膈之間令諸經不行口張目瞪氣悶欲絶當先用辛甘氣味升陽之藥引胃氣以治其本參耆升柴當歸益智草豆蔻之類加通塞之藥以治其標木香麥芽青皮陳皮之類寒月陰盛加吳茱萸以瀉陰寒之氣暑月陽盛加青皮陳皮益智黃柏散寒氣泄陰火之上逆經曰清濁相干亂於胸中是謂大悗氣不宣通最為急症不急治之諸變生矣噎與塞皆由陰中伏陽而作也夏三月陽氣在外陰氣在內噎症值此時天助正氣而挫其邪氣不治自愈如不愈者陰氣極甚正氣不伸耳乃以四君子湯送利膈丸木香檳榔各七錢五分大黃厚朴各二兩人參當歸甘草藿香枳實各一兩共為細末水和丸煎湯送三錢每飲食入胃復吐涎沫如雞子白者蓋脾主涎脾虛不能約束津液故涎沫自出非用人參白朮益智等不能攝也冬三月陰氣在外陽氣內藏外助陽氣不得發汗內消陰火勿令泄瀉此閉藏固密之大要也吳茱萸主之同益智草蔻陳皮黃耆人參升麻當歸甘草青皮木香半夏麥芽澤瀉薑黃等為末蒸餅丸生薑湯送三錢古人指噎塞為津液乾枯故水液可行乾物難進為病在上焦是矣愚謂若果津液枯涸何以湯飲才下涎即上湧乎明系咽膈之間交通之氣不得相入皆衝脈上行逆氣所為也惟氣逆故水液不得居潤下之常隨其逆上之氣湧耳若以為乾枯而用潤劑豈不反益其邪乎貴深原其故擬立一主方而隨症加減在圓機者通變也七情所傷當多用辛以橫行而散半夏白蔻益智陳皮生薑之類然中氣既傷徒與散泄邪未得除正反受困必須調養中宮以全資生之本參耆朮草之類不可少也喉中如有物不下者痰氣也俗云梅核膈加訶子昆布膈間作痛必是瘀血歸尾桃仁韭汁童便甚者宜加大黃微利之噎而聲不出者竹茹五味子生薑挾寒脈沉遲者桂附挾熱脈洪數者黃連木通噎而白沫大出糞如羊矢此二症為不治矣如食飲方下痰涎聚住不得入者雖入而涎沫隨出者先以來復丹控去其痰方見中暑門更以半夏茯苓枳殼竹瀝元明粉牙皂枯礬少許生薑汁為丸治之如大便燥結糞如羊矢自制開關利膈丸人參當歸木香檳榔枳殼大黃為末水泛丸服並用人乳或牛羊乳梨汁松子仁啖之脈緊而芤緊為寒芤為虛虛寒相搏脈為陰結而遲其人則病噎膈反胃者真火衰微胃寒脾弱不能消穀朝食暮吐暮食則朝吐設飲食入胃既抵胃之下脘復反而出者理中湯甚者加附子若脈數為邪熱不殺穀乃火性上炎多升少降與異攻散加黃連生地當歸沉香此症至口吐白沫糞如羊矢為危極矣必須養氣以培其陽益血以滋其陰則金無畏火之炎腎有生水之漸脾胃健旺飲食消磨矣咽喉閉塞胸膈滿悶暫用香砂枳朴以開滯疏結然破氣太過中氣因而不運當異功散加香砂使氣旺則能健運反胃氣逆久閉不開攻補兼施小青龍丸漸次加之其扃自透宜人參利膈丸木香檳榔枳實厚朴生地當歸大黃人參甘草為末水泛丸用然服通利之品過多血液益加耗竭其結更倍宜用杏仁去皮尖四兩炒遼松仁四兩壯豬脂熬淨一鍾白蜜四兩熔蜜餞橘柚四兩同打和成丸不時嚼食大妙再以人乳進之更妙火衰不能生土而反胃者其脈沉遲八味丸減熟地加砂仁沉香瘀血阻隔而反胃者抵當丸以湯作丸如芥子大每服三錢去枕仰臥細細咽之有蟲聚而反胃者宜檳榔雄黃牽牛大黃丸服調治得宜反胃新愈切不可便與粥飯每日用人參一兩陳皮三錢焦倉米三錢煎湯細呷之後可小試陳米飲及糜粥如倉廩未固驟貯米穀往往敗事多致不救噎者陰氣不得下降也膈者陽氣不得上行也飲食有下有不下有吐有不吐故與反胃不同杵頭糠人參末柿霜石蓮子末元明粉各等分以舌舐食如血槁者用生熟地黃麥門冬當歸萎蕤倉米煎膏入韭汁人乳或牛乳桃仁泥蘆根汁和勻細呷緩緩噙化膈噎服藥無效者用巧婦窠燒灰為末每服三錢溫酒調下服完此一窠末必痊噎症有瘀血者王宇泰立代抵當丸用大黃醋炒四兩朴硝一兩桃仁六十粒炒歸尾生地山甲炙各一兩核五錢為末蜜丸上焦膈者如芥子大臨臥就枕仰以津液下錢許中下焦膈者空心服噎膈灸法憂噎心俞思噎天府勞噎膈俞氣噎膻中食噎乳根各七壯五噎五膈食飲不下並灸膻中中脘內關食倉三里膏肓六穴反胃吐食灸用脾俞膈俞中脘氣海下脘三里命門火衰不能熟腐水穀朝食暮吐須灸腎俞肩井命門中脘關元食關各七壯附嘔吐噦嘔吐與噦皆屬於胃但以氣血多少為異耳嘔者陽明也陽明多血多氣故有聲有物氣血俱病也吐者太陽也太陽多血少氣故有物無聲乃血病也噦音越者少陽也少陽多氣少血故有聲無物乃氣病也三者皆因脾虛有火或由客寒犯胃傷食停痰逆氣瘀血亦有之耳因火與痰為多治之以氣逆者辛散為主生薑半夏茯苓陳皮客寒者藿香丁香痰火者竹茹蘆根竹瀝生薑之類詳其所因不可混也邪在上脘之陽則氣停而水積故飲之清濁混亂而為痰為飲為涎為唾變而為嘔邪在下脘之陰則血滯而谷不消故食之清濁不分為噎塞為痞滿為痛為脹變而為吐邪在中脘之氣交者二脘之嘔與吐俱見矣胃膈熱甚則嘔火氣炎上之象嘔從氣病法天之陽動而有聲與飲俱出猶雷震必雨注也吐從血病法地之陰靜而無聲與食俱出象萬物之於地也嘔吐則氣血俱病法飲食之氣交而飲食皆出然上脘非不吐食也設陽中之陰亦病則食入即吐非若中脘之食已而吐下脘之食久而吐也下脘非不嘔也設陰中之陽亦病則吐與嘔齊作然嘔少於吐不若上脘之嘔多於吐也上脘之食入即吐生薑半夏湯薑半等分中脘之食已即吐橘半湯陳皮薑半等分下脘食久而吐為反胃脈沉而無力理中湯脈滑而實半夏生薑大黃湯下之仲景治嘔谷不得下半夏一升生薑八兩茯苓四兩半夏生薑之辛但治上焦氣壅表實若胃虛者惟宜益胃推蕩穀氣而已用參術忌用辛瀉故服小半夏湯不愈者必用大半夏湯立愈是即甘瀾水也半夏二升人參三兩白蜜一升水一斗三升和蜜揚二百四十遍者藥取三升分三次服寒吐者喜熱惡冷肢冷脈細而滑用理中湯水冷服之冷遇冷相入不致吐出如用理中湯到口即吐去白朮甘草之壅加沉香木香丁香立止熱吐者喜冷惡熱煩渴小便赤澀脈洪而數二陳湯加梔連竹茹蘆根汁薑汁怒中飲食作嘔胸滿膈脹二陳加青皮木香砂仁豆蔻薑棗中脘素有痰積遇寒即發丁香豆蔻砂仁乾薑半夏陳皮加白芥子汁薑汁各半杯許痰滿胸喉粥藥入口即吐先以薑湯送下養正丹候藥可進則以二陳湯加枳實砂仁桔梗厚朴薑汁服之虛者加人參本因中寒用熱藥太過以致嘔逆二陳加白蔻沉香因七情而得者理中加木香沉香烏藥主之陰虛而龍雷之火亢道宜理中加薑汁炒熟地檳榔黃柏沉香導之使下如中氣久傷因而嘔吐宜焦米人參神麯陳皮薑棗調和胃氣冀期自止漏氣者身熱臂痛食入則先嘔而後瀉此上焦傷風閉其腠理經氣失道邪氣內著麥門冬湯麥冬人參蘆根竹茹陳皮白朮茯苓甘草萎蕤生薑陳倉米主之走吐者下焦實熱二便不通氣逆嘔吐人參湯人參白朮茯苓陳皮石膏知母豬苓萎蕤蘆根汁主之食已暴吐脈浮而洪此上焦火逆也宜桔梗枳殼厚朴陳皮木香檳榔半夏白朮茯苓氣降則火自清吐漸止加用人參芍藥補之下閉上嘔亦因火在上焦宜以桔梗陳皮木香大黃微利之乾嘔宜橘紅湯橘紅一味煎湯入薑汁甘蔗汁細細呷之噁心心中央央欲吐不吐多屬胃虛宜半夏陳皮白朮茯苓生薑主之仲景云欲吐不吐者不可下又云用大黃治食已即吐何也曰欲吐者病在土因而越之可也逆之使下則必憒亂而益甚若既吐矣當吐折之使其下行故用大黃丹溪云凡病吐者切不可下近於固矣噦之為症方書僅言其屬火乃一端耳亦有胃寒胃熱傷食停痰逆氣瘀血人當消息而治因火與痰為多嘔苦邪在膽經膽木上乘於胃上則逆而嘔膽汁故苦也宜吳茱萸黃連黃芩茯苓生薑主之嘔酸內經云諸嘔吐酸皆屬於熱東垣又以為寒何也若胃中濕氣鬱而成積則濕中生熱故從木化而味酸法當清之若久而不化則肝木日盛胃土日衰經云木欲實金當平之辛為肺金之味故辛可勝酸辛則必熱辛以制東方之實熱以扶中土之衰倘濁氣不降而曰以寒藥投之非其治也大抵吐酸一症宿食滯於胃脘平胃散加香砂曲楂若停飲所致蒼半茯陳最宜嘔清水而渴欲飲水水入即吐名曰水逆以五苓散主之赤石脂搗末服方寸匕漸添至三匕服盡一斤終身不吐痰水亦可無終身泄瀉之症吐涎沫六君子湯加益智生薑或以半夏乾薑等分為散吐膿仲景云夫嘔家有癰膿不必治嘔膿儘自愈或地黃湯胃脘癰黃耆三錢白朮三錢葵根一兩主之嘔蟲吐蛔為胃中冷理中湯加川椒黃連檳榔烏梅蛔見苦則安見椒則伏見酸則不咬也命門火衰不能腐熟水穀朝食暮吐暮食朝吐須灸腎俞肩井命門中脘關元食關各七壯五痿諸痿之症未有不因陽明虛而致者靈樞云真氣者所受於天與穀氣並而充身也素問云陽明者五臟六腑之海也四肢不能稟水穀氣陰道不行筋骨肌肉無氣以生故不用焉蓋真氣者天之道也穀氣者地之道也地非天不生天非地不成故真氣與穀氣並而後生身也陽明虛五臟無所稟受則不能行氣血濡筋骨利關節故肢體中隨其不得受水穀氣處則病痿故古人治痿獨取陽明也丹溪云肺屬金性燥居上而主氣畏火者也脾屬土性濕居中而主四肢畏水者也若嗜欲無節則水失其養火寡於畏而侮其所勝肺得火邪而熱矣木性剛急肺受熱邪則金失所養木寡於畏而侮其所勝脾得木而傷矣肺熱則不能管攝一身脾傷則不能運行四肢而病痿矣瀉南方則金清而東方不實何脾傷之有補北方則心火降而西方不虛何肺熱之有故陽明不虛則潤宗筋束筋骨利機關矣駱龍吉云風火相熾當滋腎水東垣以黃柏為君黃耆為佐而無一定之方有兼痰積者有濕多者有濕熱相半者有挾寒者活潑制方其善於治痿者乎然藥雖中竅而將息失宜終不可愈也故休息精神淡泊滋味為頂門金針五痿論云有所失亡所求不得則肺熱葉焦皮毛虛弱而生痿躄宜參耆二冬石斛百合山藥犀角通草桔梗梔子黃苓杏仁秦艽悲哀太甚則胞絡絶心氣熱則下脈厥而上上則下脈虛虛則生脈痿樞折挈脛縱而不任地宜鐵粉銀屑黃連苦參龍膽石蜜牛黃龍齒秦艽蘚皮丹皮骨皮雷丸犀角思慮無窮入房過度熱入於肝則膽泄口苦筋膜乾則筋急而攣發為筋痿宜生地天冬百合紫葳白蒺藜杜仲牛膝萆薢菟絲防風芩連木瓜感於卑濕則脾氣熱胃干而渴血液不生致肌肉不仁發為肉痿宜二陳二朮參耆苓草勞倦熱渴陰氣內乏熱舍於腎則腰脊不舉骨枯而髓減發為骨痿宜金剛丸萆薢杜仲蓯蓉菟絲等分用豬腎酒煨搗糊丸服夫皮毛筋脈三痿為內因而骨肉二痿為外感又素問生氣通天論云因於濕首如裹濕熱不攘大筋軟短小筋弛長軟短為拘弛長為痿亦有外感者矣丹溪以痹為外感風寒邪實痿為內因濕熱本虛愚謂痹乃正氣本和因外感風寒冷濕為剛烈之邪當以有餘名之痿乃正氣自虛致成濕熱拂鬱懈惰為柔緩之邪當以不足名之或者初傷七情及飲食厚味中焦鬱積淫氣不清濕熱乘虛為痿者有之或者初感濕痹郁久成熱氣血漸虛為痿者有之不可執也至如治法濕勝者亦必有脾胃虛濕之症脈微而緩弱宜用人參養胃湯及藿香散主之熱勝者亦必有內傷之症脈虛而浮大宜四君子補中益氣等加二妙散以滲濕清熱此祖內經治痿觸取陽明之法也若肝腎精血虛而濕多者謂之正虛宜溫補茸膠桂附金匱丸八味丸俱可用內雖有熱乃為虛熱補之自除所謂甘溫能除大熱也若真火熱勝者謂之偏虛脈必沉數及兼遺精白濁陰汗等症宜四物湯坎離丸類滋陰降火熱甚者宜服瀉火表劑芩連解毒湯之類時時呷之以救肺熱此丹溪治痿瀉南補北之法也有用愈風湯吞健步丸以治濕熱相半之痿然止可施之挾風邪甚者又為痹矣屬濕痰者二陳加黃柏白朮竹瀝薑汁屬死血者紅花赤芍桃仁歸稍有屬脾土太過令人四肢不舉四君子湯加芎歸倍白朮痿發於夏俗呼疰夏宜清暑益氣湯一屬腎與膀胱經云三陽為病發寒熱下為癰腫及為痿厥前方主之又一屬脾濕傷腎經曰秋傷於濕上逆而咳發為痿厥致有目昏花耳聾鳴腰膝無力當歸生地桂附防己柴羌苦參或用虎潛丸熟地歸芍知柏乾薑陳皮鎖陽牛膝龜板虎骨加附子治痿厥如神亦有濕痰瘀血阻滯經絡天麻白附子烏頭羌活牛膝芎歸乳沒木鱉山甲為末服又云人參一斤浸酒服之治腳膝痿弱可逐奔馬灸法兩手太熱為骨厥灸湧泉三壯立安針法隨前症所屬何經取各經穴刺之六痹經曰風寒濕三氣雜至合而為痹風勝為行痹痛無定處俗名流火又名走注痛今呼為鬼箭風是也古云歷節風又曰白虎歷節風皆此類也宜防風羌活葛根秦艽桂枝杏仁赤茯當歸黃芩甘草生薑煎和酒服寒勝為痛痹痛有定處或四肢攣關節腫名曰痛風加減五積散白芷茯苓半夏芎歸甘桔麻枝芍蒼薑朴煎服或四物湯加桂枝乾薑麻蒼芷殼薑黃陳秦濕氣勝為著痹麻木不仁宜蒼芷麻防芎歸芍草桑皮官桂赤苓以冬遇為骨痹春遇為筋痹夏遇為脈痹以至陰遇為肌痹秋遇為皮痹此又所遇之時而名非行痹痛痹著痹之外又有皮脈筋骨之痹也風寒濕三氣襲人入於骨則重而不舉入於脈則血凝而不流入於筋則屈而不伸入於皮則寒入於肉則不仁久而不已則入五臟煩滿喘嘔者肺也上氣咽乾厥脹者心也多飲數溲夜臥則驚者肝也尻以代踵脊以代頭者腎也四肢惰倦發咳嘔沫者脾也大抵臟症見則難治矣風痹者遊行上下隨其虛邪與血氣相搏聚於關節筋脈弛縱宜防風湯防葛羌秦歸芩甘桂赤茯杏仁姜煎入酒服濕脾者流而不移汗多四肢緩弱皮膚不仁精神昏塞茯苓川芎湯赤苓桑皮川芎官桂麻黃蒼朮歸芍甘草黑棗煎服寒痹者四肢攣痛關節浮腫加減五積散即前方熱痹者臟腑移熱復遇外邪故肢體痿痹發熱唇口反裂皮膚色變宜升麻湯升防羌麻參犀羚桂甘苓煎入竹瀝服腸痹者數飲而小便不通氣滯喘泄五苓散加麥冬桑皮木通胞痹者少腹膀胱按之內痛若沃以湯澀於小便上為清涕宜腎瀝湯杜仲五加皮犀角桔梗赤芍木通桑皮螵蛸入羊腎一個煎服血痹者邪入於陰若被風吹骨弱勞疲汗出臥則搖動宜當歸湯赤芍羌獨赤茯防秦芩草桂心生薑周痹者周身俱痛蠲痹湯歸耆羌防薑黃甘草加薑棗麻痹者手足麻痹躄痛不能舉此支飲也多睡眩冒忍尿不便膝冷成痹茯苓湯用赤苓半夏陳皮枳殼甘桔加姜煎服五臟痹宜五痹湯人參白朮茯苓甘草白芍當歸細辛五味黃芩如肝痹加柴胡棗仁心痹加茯神犀角脾痹加枳殼曲陳砂仁肺痹加杏仁麻黃紫菀腎痹加獨活川萆薢杜仲牛膝官桂行痹者走注無定羌防葛艽蒼桂芎歸威靈赤茯濕氣傷腎腎不生肝肝風挾濕流走四肢宥髃苡仁散苡仁芎歸薑桂羌獨麻防川烏朮草肢節腫痛日夜並重和血散痛湯及沒藥散專理走注沒藥二兩虎骨醋炙等分為末酒下五錢又痛痹因於風者即痛風也加減烏藥順氣散烏藥麻黃陳皮各二錢川芎白芷殭蠶枳殼桔梗甘草各五錢薑棗煎服因於濕者天陰尤甚身體沉重除濕蠲痹湯蒼朮二錢羌茯澤術各錢半甘草五分陳皮一錢竹瀝薑汁和服在上加桂枝桔梗靈仙在下加防己牛膝木通因痰者豁痰湯半夏南星陳皮厚朴柴胡黃芩羌活薄荷枳殼人參紫蘇竹瀝薑汁為丸亦可甚者控涎丹因火者三黃湯加生薑虛者四物湯中多加酒炒黃柏薑汁竹瀝因濕熱者二妙散蒼朮黃柏等分為末薑汁湯調服血虛者四物蒼朮各半湯四物五錢蒼朮五錢煎湯加酒服血瘀者芎歸桃仁紅花靈仙煎入麝少許晝靜夜發痛如虎咬名曰白虎風亦有掣者多寒腫者多濕汗者多風虎骨犀角骨碎補羌活秦艽青木香沉香歸芍桃膝等煎臨服入麝少許寒多加桂姜濕多加蒼茯風多加防耆如下肢腫痛一味木通二兩煎服立效必遍身發出紅丹或汗出至足而愈尉法用好陳醋五大碗煎沸入蔥白一斤再煮沸去醋將爛蔥白裹患處尉之著痹即麻木不仁血氣據虛所致也靈樞云衛氣不行則為不仁宜十全大補湯加升柴針法手指拘攣麻痹掣痛肩膊痠疼合谷中渚陽池腕骨外關肩髃肩井手上廉曲池尺澤已上隨症選用灸法膏肓肩井肩髃灸之無有不效肩背痛不能回顧此手太陽氣鬱不行肩貞肩外俞肩中俞肩髃藥用風劑散之下部足腿膝處冷痹即俗呼筋寒鶴膝風陰陵泉宜刺不宜灸陽陵泉針灸皆宜環跳風市選用七水腫臍腹四肢悉腫者為水但腹滿四肢不甚腫為脹滿也先頭足腫後腹大者水也先腹脹大後四肢腫者脹滿也皮厚色蒼或一身盡腫或自上而下者多屬氣皮薄色白或自下而上者多屬水水本畏土因土虛不能制水則寒水侮所不勝及乘脾土泛濫為邪其始初起必從陰分漸次而升夫水雖受制於脾而實主於腎腎本水臟而元氣寓焉若腎中陽虛則命門火衰既不能自制陰寒又不能溫養脾土陰陽不得其正則化而為邪然氣即火也陰即水也氣之與水本為同類但在化與不化耳故陽旺則化而精能為氣陽衰則不能化而水即為邪火盛水虧則病燥水盛火虧則病濕故障火不能化則陰不從陽而陰氣皆化為水所以水腫之症多屬陽虛丹溪乃云清濁相混壅塞為熱熱留為濕濕熱相生遂成脹滿治宜補脾又須養金以制木使脾無賊邪之患滋水以制火使肺得清化之權其意以制火為主誠制火固可保金獨不虞其害土乎以此治熱猶可以此治陽虛而氣不化者豈不反助陰邪哉必當察其果系實邪則直以清火滋陰為極易凡挾於虛須從溫補俾可還元或虛實未明寧先行治虛之法若治而不瘳不妨易轍猶無大害倘藥未到病未痊仍須詳察若以治有餘之法誤治虛人則真氣復傷雖施合劑不能起矣或從清利暫見平復終不補元雖目前稍愈久必危亡可不謹哉以手指按其腹隨手而滿者水也如凹而不起腹色不變者脹滿也盧砥醫鏡治水腫以肺金盛而生水水溢妄行氣閉機壅必導腎水以決去之肺乃腎之母其氣清肅果由肺盛生水則將奉行降令通調水道下輸膀胱水精四布五經並行尚安得有水腫哉肺盛生水之說斷無是理腎氣不化多因四氣相乘或濕熱盛而傷之或燥金斂澀之風水鼓激之與夫恣情閨房勞役應酬六氣七情皆足以損腎胃之關不惟因腎氣不化而後閉即胃之病而關亦自閉矣水之聚不待腎水而後成即所飲之水而亦自聚矣胃主中焦為水穀之海胃和則升降出納之氣行水穀各從其道輸泄焉胃不和則出納之機滯水穀之液皆能畜積而為水也經曰胃所生病大腹水腫膝臏腫痛又曰五穀之津液因陰陽不和則氣道不通四海閉塞三焦不瀉津液不化水穀並行腸胃之中留於下焦不得滲入膀胱則下焦脹水溢而為水脹又曰腎者牝臟也地氣上者屬於腎臟而生水液也故曰至陰勇而勞甚則腎汗出腎汗出逢於風內不得入於臟腑外不得越於皮膚客於玄府行於皮里傳於胕腫本之於腎名曰風水由是推之而水溢之病未有不因胃虛所致設使不顧其虛輒攻其水乃重虛其陰也經云肝腎脈並浮為風水蓋肝腎同處下焦腎屬陰主靜其脈常沉肝屬陽主動其脈常浮二臟俱有相火動於腎者猶龍火之出於海動於肝者猶雷火之出於澤龍起而火隨風發而水湧今水之從風猶言腎脈本沉因從肝化而與之俱浮仲景有石水風水之分腎肝之脈並沉為石水宜海蛤丸海蛤煅防己各七錢五分陳皮郁李仁去皮炒各五錢赤茯桑皮葶藶故紙焙一兩為末蜜丸米飲下肝腎之脈並浮為風水身重汗出惡風宜防己黃耆湯防己一兩黃耆一兩三錢白朮七錢甘草炙一錢薑棗煎服自汗出無大熱惡風一身悉腫越婢湯麻黃六兩石膏八兩甘草一兩生薑三兩大棗十五枚擘水六升煎服水腫陰陽之辨陽水者遍身腫煩渴小便赤澀大便多閉輕則用四磨五苓重則用疏鑿飲子陰水者遍身腫不煩渴大便自調或溏瀉小便雖少而不赤澀用實脾飲或小便如常有時赤有時不赤晚則微赤即無赤澀者亦屬陰也未可遽用補劑先用木香香附烏藥茯苓豬苓次用復元丹附子木香茴香川椒厚朴獨活檳榔白朮陳皮茱萸桂心澤瀉肉果有一身惟面及足俱腫早則面甚晚則足甚面腫為風足腫為水須察其大小便通閉別其陰陽而治之有耳內疳瘡以致耳腫及面與上半身甚者羌活白芷升麻防風蘇葉下半身甚者五苓散加木通二術大病後腫明系脾虛不能通調水道補中益氣湯送六味丸腎水不足虛火爍金不生小便者六味丸兼與補中益氣湯互用久服自效誤與疏氣行水將有性命之憂亟與金匱腎氣丸尚有可救者行水法赤豆同大蒜煮粥以豆豉啖之冬瓜日日可吃用鯉魚重斤許以上者和冬瓜蔥白作羹食青頭鴨白鴨俱可作羹同赤豆粥空腹時食目窠微腫如臥蠶者水也足腫甚者水也頸脈動者及痰咳喘者亦水也脈沉主水水病脈浮者死洪大者生細微者死五傷者死唇黑肝傷缺盆平心傷臍突脾傷背心平肺傷足心平腎傷切忌魚肉雞面羊酒鹽不忌必甚九種水病根源症治一清水先從兩脅腫起根在肝大戟主之二赤水先從舌根起根在心葶藶主之三黃水從腰腹起根在脾甘遂主之四白水從足腫起根在肺桑皮主之五黑水從外腎起根在腎連翹主之六緑水從面頰起根在外腎芫花主之七風水從四肢起根在膀胱藁本主之八高水從少腹腫起根在小腸巴霜主之九氣水或盛或衰根在三焦赤豆主之上九種藥等分主某經者倍之為末蜜丸赤茯苓湯送錢許下日三服忌鹽醬一月又忌魚肉蝦蟹羊雞鵝面及一應毒物生冷房室憂勞醉飽開鬼門麻黃羌活防風柴胡牛蒡忍冬蔥白柳枝蒼朮荊芥蘇葉梗並可煎湯浴洗潔淨府木通澤瀉香茹甘草燈心冬葵子蜀葵子海金沙葶藶防己海藻昆布茯苓赤豆豬苓青蛙海蛤緑頭鴨白螺鯉魚白魚鱸魚鯽魚已上俱用秋石代咸煮食或加田螺二個滾酒內煮食去菀陳莝商陸同赤粳米煮飯日常食之甚效又用甘遂芫花續隨子牽牛同大麥面作面吃老絲瓜巴豆拌炒又同冬朮炒去豆術為末丸服大戟煎湯服巴豆同杏仁炒去豆食郁李仁酒食四十九粒或為末和丸作餅吃宣布五陽附子肉桂乾薑吳萸黃白雄雞並同赤豆煮食其外戍肉亦可食血腫成水紅花劉寄奴澤蘭益母紫草水脹方羯雞矢八合炒微黑好酒三碗煎取汁五更熱服於辰巳二時行二三次二日有皺紋起於足再服妙此素問方也禹餘糧丸治水腫聖劑蛇含石三兩鐵銚盛燒紅醋淬研極細禹餘糧三兩針砂五兩淘淨炒醋二碗同禹糧入銚煮乾連銚燒紅傾地上出火氣研細聽用以羌活木香茯苓川芎牛膝桂心白蔻大茴蓬朮青皮附子乾薑三稜白蒺藜當歸各五錢為末入前三味拌勻蒸餅丸桐子大空心滾水下三十丸虛人亦可用不傷元氣所大忌者獨鹹味耳一毫入口病發更甚只去小便不去大便每日三服更以溫補煎方助之真神方也外治方大戟芫花甘遂海藻等分為末醋調和麵少許攤於綿帛上貼腫處口咬甘草不過兩三時水即下矣鋪臍方好輕粉二錢巴豆四兩生硫磺一錢研勻成餅先以新綿鋪臍上次鋪藥餅外以帛緊束之如人行十里許即下水待行三五度即去藥以溫粥補之一餅可治十人灸法中脘二七壯在臍上四寸上下一寸居歧骨與臍之分中又炙水分穴如年壯在臍上一寸禁刺刺之則水盡即死又法神闕以鹽填滿臍中著艾灸如年壯或二七壯八瘧夫風寒暑濕四氣皆能客而為瘧或客於腸胃之外或客於營氣之舍或客於脊骨之間或客於五臟之募原深淺不同故先寒後熱或先熱後寒或寒多熱少或熱多寒少或但寒不熱或但熱不寒往往夏傷風暑秋涼束之寒熱為瘧淺者病在三陽一日一發深者病在三陰間日一發或三日一發病愈深則發愈遲陳無擇曰內傷七情外感六氣皆能鬱而成痰著而成瘧內外所傷之邪皆客於營氣之舍故發有常期夫營衛之舍猶人之傳舍也營衛日行一周歷十二經之界分內薄之邪與日行之衛氣相會則瘧發離則瘧止其發也不惟脈外之衛虛是陽明與營俱行者亦虛陽明虛則天真因水穀而充者亦虛故瘧發之際且勿服藥恐反傷胃氣與天真之氣也必俟陰陽並極而退其營衛天真營衛離而復集過此邪客之合然後治之或當其未發迎而奪之有外邪者必須汗解若是虛人先以人參白朮實其胃氣然後取汗須至足乃佳取汗不必汗藥但開通經郁則邪自散汗自透矣發於子後午前是陽分受病其病易愈發於午後寅前陰分受病其病難愈別陰陽氣血察形色衰旺以治之形壯色澤者病在氣分則通經開鬱以取其汗色稍夭者必先補而取之挾痰者必先實其胃方與劫劑形弱色枯者不可取汗亦不可劫但養正氣微與和解形壯色黑者病在血分須行其阻滯色枯者補血調氣至於取汗不得汗理血而瘧不痊則當更與精恩詳切深中病情方收十全之效寒瘧先寒後熱用紫蘇羌活細辛白芷生薑以散太陽之邪溫瘧先熱後寒體重痛嘔逆脹滿胃苓湯二朮厚朴茯苓豬苓澤瀉陳皮甘草加羌活紫蘇煎服疸瘧但熱不寒者肺素有熱發於盛暑用知母石膏煨人參麥冬甘草發於秋涼之候柴胡陳皮黃苓半夏甘草薑棗牝瘧但寒無熱者陽虛陰盛也桂枝羌活柴胡紫蘇木香生薑食瘧飢不能食食即脹滿嘔吐腹痛二朮檳榔草果豆蔻山楂青皮香附砂仁神麯麥芽之類瘴瘧嶺南嵐嶂之毒發時迷悶涎聚於脾血瘀於心檳榔草果柴胡半夏黃芩大黃木香薑棗癆瘧素虛不足久瘧成癆參耆苓朮歸芍地草首烏鱉甲葛根烏梅瘧母邪伏少陽結塊於肋人參朮苓草蓬半青陳肉桂鱉甲時行鬼瘧蒼朴甘陳桃仁木香升麻雄黃三日瘧本於三陰不足參朮芎歸柴芍首烏烏梅陳皮薑汁發於子午卯酉為少陰瘧加丹參圓肉寅申巳亥日為厥陰瘧加丹皮木香辰戌丑未日為太陰瘧加白豆蔻茯苓然三陰受病皆謂之溫瘧發於處暑後冬至前此傷之重遠而深者也三陽受病皆謂之暴瘧發在夏至後處暑前此傷之淺者近而暴也瘧分南北東南瀕海海風無常多食魚鹽人多停飲故多風瘧及食瘧烏頭草果陳皮半夏為宜西北高曠寒則水冰地裂熱則爍石流金人多中寒伏暑故多暑瘧與寒瘧香茹柴胡常山草果檳榔等為宜審知胸中有飲陳皮鹽湯吐之若不吐便可抑之檳榔青皮枳實瘧家多宿痰惟常山吐之利之大有奇功次以大黃佐之大瀉數行其病若失大凡寒熱乍已之時胸中滿悶不退皆痰涎之故也若衄血或便血婦人或月候適來皆是血症劑中加元胡索桃仁蓬朮挾水者逐水挾血者攻血隨症施治未有不效者也若病不甚而用常山不取其吐利當以酒浸炒之雖用一二錢毫不吐也世有畏之如螫蓋未明其性耳瘧發已多遍治無功意非外邪亦無內滯惟用人參生薑各一兩煎湯發時五更服必止甚者連進三服無不愈者如在貧者白朮可代夜發加當歸無不奏功瘧母者頑痰挾血挾食結為癥瘕用小柴胡湯加鱉甲五錢莪朮二錢五分俱以醋製服之必驗瘧久不痊必有留滯須加鱉甲消之截瘧之法種種不同內經論刺最詳乃至用藥攻邪存正調營衛之偏和陰陽之逆是矣今以檳榔去痰穿山甲透經絡常山破痰癖用此截瘧如精兵據其險要萬無不截之理如本無痰涎止於暑結營分貴在鱉甲香茹生薑而前藥為無益有損也若元氣虛極止宜補正如常山山甲皆為戈矛矣傷寒有往來寒熱如瘧並虛損有往來寒熱如瘧謂之如瘧非真瘧也傷寒之寒熱也始則必惡風惡寒發熱頭疼體痛自太陽傳至少陽半表半裡故往來寒熱也虛損勞病之寒熱也其初必五心煩熱咳嗽倦怠微微日久陽虛生外寒陰虛生內熱故寒熱時作也即痰飲㿗疝積聚停食暑濕燥火癰疽瘡毒亦皆有寒熱之候豈得盡謂之瘧乎須細問其病原有何病因投治無誤大凡寒熱有常期者瘧也無常期者雜症也在太陽經者謂之風瘧治多汗之在陽明經者謂之熱瘧治多下之在少陽經者謂之風熱瘧治多和之常山截瘧丸常山酒浸一宿炒透為末烏梅肉為丸每服二錢發日五更用一加檳榔山甲鱉甲醋炙為末烏梅肉為丸每服三錢薑湯下外治方蛇退塞耳或生半夏塞鼻男左女右立止針法間使穴在手掌下臂上三寸兩筋間是瘧疾久不止百勞間使後溪足三里針之丸痢痢症起於夏秋濕熱鬱蒸因乎天也生冷停滯由乎人也當炎暑之令不能保攝脾胃大食瓜果肥甘土氣受傷無以制濕濕蒸熱壅以致怫逆氣不宣通因而腸胃反窒裡急後重小便赤澀宜以苦寒之藥燥濕滌熱佐之以辛溫便能開鬱運氣故行血則便膿自愈調氣則後重自除然虛實寒熱淺深新久之不同未可以一例治也心者血之主也肺者氣之主也凝滯則傷氣鬱熱則傷血氣血既病則心肺亦病矣而小腸心之合也大腸肺之合也二經皆出納水穀轉輸糟粕之官也而胃又為大小腸之總司也肺移病於大腸則氣凝泣而成白痢心移病於小腸則血凝泣而成赤痢大小腸俱病則赤白互下胃土傳濕熱於大小腸痢色兼黃至於色之黑者分為二經如焦黑之黑者此熱極反兼勝己之化也如黑漆之黑者此瘀血凝久而然也治痢從腸胃此籠統之說也不知在腸胃者乃屬標病其所感之邪與所受之經乃本病也若腸胃自感而病亦當分邪正或正氣先虛而受邪或邪氣干犯而致虛則以先者為本後者為標積有新舊舊積者氣血食痰所化也新積者舊積已去未幾復生者也然舊積宜下新積禁下其故何也蓋腸胃之熟腐水穀轉輸糟粕皆是營衛灑陳於六腑之功今腸胃有郁則營衛運行之常度因之阻滯不能施化故衛氣鬱而不舒營血注而不行於是飲食結痰停於胃糟粕留於腸與所郁之氣血相雜而成滯下之症矣必當下之以通其壅塞既下之後升降仍不行清濁仍不分則衛氣復郁營血復注又成新積烏可復下乎但理衛氣以開通腠理和營血以調順陰陽則升降合節積雖不治而自化矣然舊積亦有不可下者或先因腸胃之虛不能轉輸其食積必當先補正氣然後下之庶無失耳但能耗氣損血用之不已氣散血亡五臟損而死期至矣其固澀之方又足以增其氣血之壅滯變為腫脹變為喘嗽如此死者醫殺之耳丹溪云滯下逼迫正合承氣症但氣口脈虛平昔胃傷寧忍兩三日辛苦遂與參朮歸芍陳甘補劑兩日後胃氣稍復方與承氣苟不先補而遽攻之難免後患乎戴復庵云氣滯成積故治痢以順氣為先又須當養胃故曰無飽死痢疾也痢初發時裡急後重頻欲登圊及去而所下無多才起則腹急皆濕熱凝滯之故也宜藿香正氣散加木香枳殼黃連砂仁或加檀香乳香麝香冰片血色紫黯屢服涼藥所下愈多當作冷痢宜理中湯加木香肉蔻如純下血而色鮮紅者此心家伏熱也犀角屑二錢硃砂二錢牛黃三錢人參三錢丸如麻子大麵糊拌每用一錢燈心圓眼湯下仲景云小腸有寒其人下重便血以乾薑燒黑存性磁碗合放地上出火氣取為末每服一錢米飲調下裡急而至圊反不能即出者氣滯也疏通為主裡急而頻見汙衣者氣脫也補澀為主後重而至圊稍減者火迫也黃連為主後重至圊而轉增者下陷也升麻為主積如膠凍或如鼻涕此為冷痢先用木香沉香豆蔻砂仁厚朴次用理中湯加木香冒暑而成自汗發熱面垢嘔渴腹痛小便不通香薷飲加黃連或五苓散藿香正氣散加香薷黃連老人深秋患痢嘔逆者黃柏末陳米飲為丸人參白朮茯苓甘草湯送下冷痢不能食肉蔻陳米為末米飲調服入秋而痢白豆蔻厚朴自不可缺肺經之氣鬱大腸桔梗蘇子為君以痢藥佐之脹滿惡食腹痛者實也木香黃連芍藥枳殼檳榔枳實厚朴煩渴喜冷飲脈堅大滑數熱也芩連為君濕熱二朮二苓芩連氣滯木香藿香枳殼厚朴枳實蘇子陳皮砂仁豆蔻檳榔和血則便膿自愈四物可用久而虛滑者補中益氣加肉蔻訶子北五味新起而實且澀滯者檳黃丸色焦黑者檳黃加香連芩芍如漆之黑者歸尾赤芍桃仁大黃枳實芒硝厚朴裡急不快者香連檳實芎歸裡急汙衣參朮訶蔻烏味甘桔後重得解轉甚參耆朮草升柴後重得解即減芩連香砂檳黃虛坐努責久圊不解血虛也歸地芍紅口腹怕冷脈沉細寒也理中加香蔻肝氣逆上吳萸黃連木香青皮白芍噤口痢食到便吐上焦火逆也黃連木香茯苓桔梗枳殼陳皮半夏菖蒲生薑噤口虛者陳米三錢蓮肉五錢人參一錢煎好入薑汁少許細細呷之如吐出再呷但得一呷下咽便開久瀉無度腹痛者禹餘糧五錢赤石脂白朮各三錢訶子肉蔻各一錢五分腹痛芍藥甘草湯戊己化土此仲景方也挾虛者建中湯然古人以建中湯治痢不問赤白新久用之皆效一方治腹痛神妙黃連枳殼等分槐花一兩浸水拌上二味炒乾去槐花只用二味煎好入乳香沒藥各八分服久虛大滑服藥不效者大斷下丸龍骨枯礬赤石脂薑附訶蔻為末醋糊丸米湯下即因用澀味亦須倍以砂陳以利其氣恐太澀則腸胃不利反作痛也灸天樞氣海大能止瀉病在中州脾土只須薑蔻理之若病在腎家以赤石脂禹餘糧補骨脂北五味有功也大孔作痛亦有寒熱之分挾熱者檳榔茯苓香連挾寒者以炒鹽尉之或枳實為末炒熱尉之內服人參乾薑甘草陳皮當歸作湯用脫肛一症最難用藥熱則肛門閉寒則肛門脫磁石為末食前米飲下二錢外用鐵鏽湯洗之屢止屢發名曰休息痢多因用澀止太早或不能節飲食戒嗜好所以時作時止宜四君子或補中益氣加香連或肉蔻審無積滯惟見虛滑椿根皮三錢粟殼二錢參術各一兩木香粳米各二錢煎服有五更及午前甚者屬腎補骨脂山藥北五味龍骨丸服午後甚者屬脾吳茱萸肉蔻白朮甘草丸服蟯蟲痢其形極細腸虛則生從穀道出或作癢者內服桃仁蕪荑槐子雄黃丸外用苦參黃連桃仁青葙子雄黃為末艾汁丸如小指大棉裹納肛門中先瀉後痢者脾傳腎為賊邪難愈先痢後瀉者腎傳脾為微邪易治虛則補脾土虛甚則當補土母是也久痢已成壞症變態百出勿論其脈勿論其症只宜以參附耆朮香砂補脾健胃常有得生者痢後變成痛風周身流注皆屬虛症調攝失宜也補中益氣加羌獨寄生虎骨松節或加乳沒蒼柏桃仁紫葳煎服死症下純血者死如屋漏水者死大孔如竹筒者死唇若塗朱者死發熱不休者死如魚腦如豬肝半死半生脈法沉小細微者吉洪大滑數者凶脈大為未止微弱為欲止身雖發熱不死針灸法久痢不止中脘脾俞天樞足三里三陰交裡急後重下脘天樞照海虛寒久瀉關元中極天樞三陰交附氣痢方牛乳半斤蓽撥三錢同煎減半空心頓服良十水瀉經曰春傷於風夏生飧泄又曰春傷於風邪氣留連乃為洞瀉難經云濕多成五泄一曰胃泄色黃食不化輕者香砂枳朴重者枳朴硝黃二曰脾泄腹脹注泄食即嘔吐理中湯加肉蔻訶子升麻三曰大腸泄食已窘迫大便色白腸鳴切痛附薑朮草四曰小腸泄溲澀而便膿血少腹作痛朴殼檳芍芩通大黃五曰大瘕泄裡急後重數至圊而不能便莖中痛芍歸朴殼芩檳木香大黃東垣云胃氣和平飲食入胃精氣輸於脾土上歸於肺而後行營衛也飲食一傷起居不時損其胃氣則上升清華之氣反下降而為飧泄矣久則太陰傳少陰而為瘕寒冷之物傷中腹滿而脹傳為飧泄宜溫熱以消導之濕熱之物傷中下膿者宜苦寒以內疏之風邪下陷升舉之濕氣內盛者分利之裡急者下之後重者調之腹痛者和之洞泄腸鳴脈細微者溫之收之膿血稠黏每至圊不能便脈洪大有力者下之涼之大抵治病而求其所因察何氣之勝取相制之藥治之因其所利而利之以平為期此治法也瀉利久不止及暴下者皆太陰受病不可少白朮甘草芍藥是以聖人之法若四時下利者前方中春加防風夏加黃芩秋加厚朴冬加桂附然須更詳外症或虛實寒熱之殊為主倘自汗手足厥冷氣微雖盛夏必投薑桂或煩熱躁渴脈實即隆冬亦用硝黃是在智者之通變耳戴復庵云水瀉而腹不痛者濕也六君子湯加平胃散飲食入胃輒下完穀者氣虛也補中益氣湯亦有風邪入胃清陽在下升陽除濕湯腹痛瀉水腸鳴痛一陳瀉一陳者火也香連甘芍通滑洞泄多下清水胃苓湯或多或少痰也平胃散加半夏腹痛而瀉瀉後痛減者食積也平胃加楂芽神麯溏泄者汙積黏垢濕兼熱也柴苓湯胃苓湯鶩泄者所下皆澄徹清冷小便清白濕兼寒也理中湯加肉蔻濡泄者體重軟弱瀉下多水濕自甚也補中合除濕滑泄者久下不能禁濕甚氣脫也補中加訶蔻赤石脂止澀之飧泄即洞泄也水穀不化濕兼風也升陽除濕湯或平胃散加羌防治之東垣云夏間淫雨陰寒時行瀉利豫一日體重肢冷瀉利小便祕塞思其治法經云諸泄小便不利先分利之又云治濕不利小便非其治也必用淡滲以利之是其法也噫聖人之法布在方策其不盡者可以意求乎若年已五十以上者降氣多而升氣少得淡滲之品是降而又降更益其陰而重竭其陽必用升陽補氣之劑同升柴羌獨甘防用之所謂濕寒之勝以風平之又曰下者舉之是因曲而為直也若不達升陽之道一概施治安得取效乎瀉有寒熱寒則脈遲身冷不獨溲清白或綿綿腹痛附子理中湯加肉蔻仲景云下利不止與理中而利益甚夫理中惟理中焦此利下焦故加附子及赤石脂禹餘糧治之藥與食入口即瀉者直腸瀉也不治熱則脈大口渴便少六一散或胃苓湯加黃連瀉而脈滑堅者大承氣湯凡泄瀉津液既去口中必渴小便自少不可便作熱論須以脈參之伏暑瀉玉龍丸硝硫礬滑四味為末水丸服盛暑通於外陰冷傷其中連理湯治之氣虛瀉者四君子加升柴訶蔻傷食瀉必噯氣如敗卵治中湯加香砂枳朮楂芽再煨所傷之物存性為末調服傷酒瀉葛知解酲湯傷麵食瀉必用卜子曲芽蒼朴痰瀉二陳湯加海石神麯青黛竹瀝薑汁丸服五更時瀉屬腎虛必用補骨脂茱萸肉五味山藥茴香茯苓肉桂治之其瀉已愈至明年屆期復發者有積也又脾主信故耳香砂枳朮丸加蓬稜虛者倍白朮加人參灸法大瀉氣脫不知人事口眼俱閉呼吸欲絶急灸氣海如年壯大進人參附子稍緩則不及救矣又法加灸天樞泄瀉水穀不分灸水分七壯此穴能分水穀利小便也久痢體重滑泄不止用止澀諸藥不效宜灸天樞氣海二穴即止水漬入胃名曰溢飲滑泄不止渴而飲水水下又泄泄又大渴此無藥症宜急灸大椎腸鳴不已時上衝心灸神闕裡急後重灸下脘天樞照海下利手足厥冷無脈者急灸天樞氣海灸之不溫脈亦不至及微喘者死十一厥有八症陽氣衰乏者陰必湊之令人五指至膝上皆寒名曰寒厥是寒氣逆於上也宜六物附子湯主之附子肉桂防己炙甘草白朮茯苓陰退則陽進故陰氣衰於下則陽往湊之故令人足下熱也熱甚則循三陰經而上逆謂之熱厥宜大補丸主之黃柏一味炒褐色為末作九肝藏血而主怒怒則火起於肝載血上行故令血菀於上是血氣亂於胸中相薄而厥逆也謂之薄厥宜蒲黃湯主之蒲黃一兩炒褐色清酒十大杯熱沃之溫服諸動屬陽故煩勞則擾乎陽而陽氣張大陽氣張大則勞火亢矣火炎則水乾故令精絶是以遷延闢積至於夏月內外皆熱水益虧而火益亢孤陽厥逆如煎如熬故曰煎厥宜人參固本丸主之人參二兩天麥二冬生熟二地各四兩為末蜜丸桐子大五尸之氣暴注於人亂人陰陽血氣上有絶陽之絡下有破陰之紐形氣相離不相順接故令暴厥如死名曰尸厥宜二十四味流氣飲及蘇合香丸主之流氣飲丁香肉桂草果麥冬赤茯木通檳榔枳殼厚朴木瓜青皮陳皮大腹皮木香蓬莪朮人參白朮甘草白芷紫蘇香附菖蒲半夏制藿香蘇合香丸沉香青木香烏犀角香附子丁香硃砂白朮訶黎勒白檀香麝香蓽茇龍腦安息香蘇合香各二兩熏陸香一兩為末蜜丸聽用寒痰迷困四肢逆冷名曰痰厥宜姜附湯主之胃寒即吐蛔蟲名曰蛔厥宜理中湯加川椒五粒檳榔五分吞烏梅丸姜附湯乾薑生附子煎服烏梅丸烏梅去核三十個人參細辛黃柏附子炮桂枝各六錢乾薑炮一兩當歸蜀椒淨各四兩為末蜜丸理中湯人參甘草白朮乾薑水煎送烏梅丸氣為人身之陽一有怫鬱則陽氣不能四達故令手足厥冷與中風相似但風中身溫氣中身冷耳名曰氣厥宜八味順氣散主之白芷臺烏藥青皮陳皮人參白朮茯苓甘草水煎服針法四肢厥逆脈伏宜用圓利針針復溜穴針至骨處候回陽脈出針灸法氣海腎俞肝俞
